<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="../support.js"></script>
<script src="../_theme/chrome.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="../_ds/noor-design-system-46f42e91-1858-412f-bdb6-560a6cc3df9f/colors_and_type.css">
  <link rel="stylesheet" href="../_theme/poc.css">
  <link rel="stylesheet" href="../_theme/components.css">
  <script src="../_ds/noor-design-system-46f42e91-1858-412f-bdb6-560a6cc3df9f/_ds_bundle.js"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0..1,0&amp;display=block">
  <link rel="stylesheet" href="../_theme/icons.css">
  <style>
    body{background:var(--canvas-bg);padding:36px 32px 90px;min-height:100vh;box-sizing:border-box}
    ::-webkit-scrollbar{display:none}*{-ms-overflow-style:none;scrollbar-width:none}
    @keyframes stepin { from{transform:translateX(28px);opacity:0} to{transform:translateX(0);opacity:1} }
    @keyframes stepback { from{transform:translateX(-28px);opacity:0} to{transform:translateX(0);opacity:1} }
    .step-fwd { animation:stepin .35s cubic-bezier(.2,.8,.2,1) }
    .step-back { animation:stepback .35s cubic-bezier(.2,.8,.2,1) }
    @keyframes qrscan { 0%{top:6%} 50%{top:94%} 100%{top:6%} }
    .qr-scanline { animation:qrscan 2s ease-in-out infinite }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .pc-cursor { display:inline-block; width:2px; height:20px; background:var(--color-action-primary); border-radius:1px; margin-left:1px; vertical-align:middle; animation:blink 1s step-end infinite }
    .kp-key:active { filter:brightness(0.92) }
    [data-theme="dark"] .kp-key:active { filter:brightness(1.25) }
    ::view-transition-group(*) { animation-duration:var(--motion-emphasized);animation-timing-function:var(--ease-out) }
    @media (prefers-reduced-motion:reduce){.step-fwd,.step-back,.qr-scanline,.pc-cursor{animation:none}::view-transition-group(*){animation-duration:0ms}}
  </style>
</helmet>

<!-- Reusable components layer (loads Dialog for the storyboards + LoginSheet) -->
<x-import component="Dialog" from="../_theme/components.jsx" hint-size="0,0"></x-import>

<!-- ── Page header (shared board chrome) ── -->
<x-import component="BoardHeader" from="../_theme/board.jsx"
          title="Masjid Explore — Map · List · Pincode · QR"
          subtitle="Explore masjids near you: toggle the map (pins + carousel) and the list, search by pincode, or scan a masjid QR to jump straight to it. Follow a masjid for prayer-time notifications."
          hint-size="1440px,92px"></x-import>

<!-- ── Board ── -->
<div class="poc-stage">

  <!-- Storyboard rows: static frames, ring follows the live device -->
  <div class="poc-frames">
    <x-import component="MapRow" from="./storyboards/map-row.jsx" active="{{ mapActive }}" on-select-frame="{{ selectMapFrame }}" hint-size="1200px,600px"></x-import>
    <x-import component="ListRow" from="./storyboards/list-row.jsx" active="{{ listActive }}" on-select-frame="{{ selectListFrame }}" hint-size="900px,600px"></x-import>
    <x-import component="QrRow" from="./storyboards/qr-row.jsx" active="{{ qrActive }}" on-select-frame="{{ selectQrFrame }}" hint-size="900px,600px"></x-import>
    <x-import component="PincodeRow" from="./storyboards/pincode-row.jsx" active="{{ pincodeActive }}" on-select-frame="{{ selectPincodeFrame }}" hint-size="1200px,600px"></x-import>
  </div>

  <!-- Live device — one continuous prototype -->
  <x-import component="BoardLive" from="../_theme/board.jsx" restart="{{ restart }}" hint-size="400px,900px">
        <x-import component="IOSDevice" from="../ios-frame.jsx" hint-size="402px,874px">
          <div style="width:100%;height:100%;position:relative;overflow:hidden;background:var(--color-surface-primary)">

            <!-- ════ STAGE · MAP ════ -->
            <sc-if value="{{ isMapStage }}">
              <div class="{{ stepAnim }}" style="position:absolute;inset:0">
                <x-import component="ExploreMapScreen" from="./storyboards/screens.jsx"
                          selected-idx="{{ selectedIdx }}"
                          followed="{{ followed }}"
                          guest="{{ guest }}"
                          on-select-masjid="{{ selectMasjid }}"
                          on-toggle-follow="{{ toggleFollow }}"
                          on-back="{{ goBack }}"
                          on-search="{{ onSearch }}"
                          on-qr="{{ onQr }}"
                          on-open-list="{{ onOpenList }}"
                          on-recenter="{{ recenter }}"
                          card-transition-enabled="true"
                          hint-size="100%,100%">
                </x-import>
              </div>
            </sc-if>

            <!-- ════ STAGE · LIST ════ -->
            <sc-if value="{{ isListStage }}">
              <div class="{{ stepAnim }}" style="position:absolute;inset:0">
                <x-import component="ExploreListScreen" from="./storyboards/screens.jsx"
                          followed="{{ followed }}"
                          guest="{{ guest }}"
                          selected-idx="{{ selectedIdx }}"
                          on-toggle-follow="{{ toggleFollow }}"
                          on-back="{{ goBack }}"
                          on-search="{{ onSearch }}"
                          on-qr="{{ onQr }}"
                          on-open-map="{{ onOpenMap }}"
                          card-transition-enabled="true"
                          hint-size="100%,100%">
                </x-import>
              </div>
            </sc-if>

            <!-- ════ STAGE · QR SCAN ════ -->
            <sc-if value="{{ isQrStage }}">
              <div class="{{ stepAnim }}" style="position:absolute;inset:0">
                <x-import component="QRScreen" from="./storyboards/screens.jsx"
                          scanning="{{ qrScanning }}"
                          permission-denied="{{ qrPermissionDenied }}"
                          following="{{ qrFollowing }}"
                          guest="{{ guest }}"
                          on-toggle-follow="{{ toggleQrFollow }}"
                          on-scan="{{ qrDetect }}"
                          on-back="{{ onOpenMap }}"
                          hint-size="100%,100%">
                </x-import>
              </div>
            </sc-if>

            <!-- ════ STAGE · PINCODE SEARCH ════ -->
            <sc-if value="{{ isPincodeStage }}">
              <div class="{{ stepAnim }}" style="position:absolute;inset:0">
                <x-import component="PincodeScreen" from="./storyboards/screens.jsx"
                          query="{{ pincodeQuery }}"
                          focused="{{ pincodeFocused }}"
                          followed="{{ followed }}"
                          on-toggle-follow="{{ toggleFollow }}"
                          on-focus="{{ pincodeFocus }}"
                          on-key-press="{{ pincodePress }}"
                          on-pick-suggestion="{{ pickSuggestion }}"
                          on-back="{{ onOpenMap }}"
                          hint-size="100%,100%">
                </x-import>
              </div>
            </sc-if>

            <!-- Guest follow LoginSheet (MasjidExplorerEffect.kt) — overlays whichever stage tried to follow -->
            <x-import component="Dialog" from="../_theme/components.jsx"
                      mode="sheet"
                      is-open="{{ loginSheetOpen }}"
                      on-close="{{ closeLoginSheet }}"
                      title="Sign in to follow masjids"
                      description="Sign in with your phone number to follow masjids and receive their prayer timings and updates."
                      primary="{{ loginSheetPrimary }}"
                      secondary="{{ loginSheetSecondary }}"
                      hint-size="0,0">
            </x-import>

          </div>
        </x-import>
  </x-import>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  QR_RESULT_IDX = 0;        // the masjid the QR resolves to (reuses a nearby result)

  state = {
    stage: (location.hash.startsWith('#qr') ? 'qr'
          : location.hash.startsWith('#pincode') ? 'pincode'
          : location.hash.startsWith('#list') ? 'list' : 'map'),   // 'map' | 'list' | 'qr' | 'pincode'
    stepDir: 'fwd',
    selectedIdx: 0,
    // { [index]: true } — survives selection + view changes. Seeded from #followed-<idx>
    // when we return here from the personal-details flow (follow the pending masjid).
    followed: (() => { const m = (location.hash.match(/#followed-(\d+)/) || [])[1]; return m != null ? { [parseInt(m, 10)]: true } : {}; })(),
    guest: location.hash.includes('guest'),  // guest browse mode (e.g. #map-guest from the guest Home)
    // Signed in but profile not completed: a follow attempt routes to personal-details first.
    needsDetails: location.hash.includes('needs-details'),
    loginSheetOpen: false, // guest follow attempt → "Sign in to follow masjids" LoginSheet
    qrScanning: location.hash !== '#qr-permission',
    qrPermissionDenied: location.hash === '#qr-permission',
    pincodeQuery: '',      // pincode stage: typed digits (max 6)
    pincodeFocused: false, // pincode stage: keypad up + suggestions visible
  };

  componentDidMount() {
    if (this.state.stage === 'qr' && !this.state.qrPermissionDenied) this.startQrScan();
  }

  componentWillUnmount() { clearTimeout(this._qrTimer); }

  selectMasjid = (i) => this.setState({ selectedIdx: i });

  // Follow is gated (MasjidExplorerViewModel.toggleFollow):
  //  · guest → "Sign in to follow masjids" LoginSheet
  //  · signed in w/o profile → route to personal-details, which posts details then follows this masjid
  //  · otherwise → toggle follow
  toggleFollow = (i) => {
    const s = this.state;
    if (s.guest) { this.setState({ loginSheetOpen: true }); return; }
    if (s.needsDetails) { window.location.href = '../personal-details/Personal Details.dc.html#follow-' + i; return; }
    this.setState(st => ({ followed: { ...st.followed, [i]: !st.followed[i] } }));
  };

  closeLoginSheet = () => this.setState({ loginSheetOpen: false });
  signIn = () => { window.location.href = '../onboarding/Onboarding.dc.html#login'; };

  recenter = () => this.setState({ selectedIdx: 0 });

  // Map ⇄ list keeps the selected masjid card as the stable spatial anchor.
  transitionExplorerView = (stage) => {
    const update = () => this.setState({ stage, stepDir: 'none' });
    const reduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (!reduced && document.startViewTransition) document.startViewTransition(update);
    else update();
  };
  onOpenList = () => this.transitionExplorerView('list');
  onOpenMap = () => { clearTimeout(this._qrTimer); this.transitionExplorerView('map'); };

  // QR scan: enter scanning, auto-detect after a beat (or on tapping the frame).
  onQr = () => { this.setState({ stage: 'qr', stepDir: 'fwd', qrScanning: true, qrPermissionDenied: false }); this.startQrScan(); };
  startQrScan = () => {
    clearTimeout(this._qrTimer);
    this._qrTimer = setTimeout(() => this.setState(s => (s.stage === 'qr' ? { qrScanning: false } : {})), 1800);
  };
  qrDetect = () => { clearTimeout(this._qrTimer); this.setState({ qrScanning: false }); };
  toggleQrFollow = () => this.toggleFollow(this.QR_RESULT_IDX);

  // Pincode search.
  onSearch = () => this.setState({ stage: 'pincode', stepDir: 'fwd', pincodeQuery: '', pincodeFocused: false });
  pincodeFocus = () => this.setState({ pincodeFocused: true });
  pincodePress = (key) => this.setState(s => {
    if (key === 'backspace') return { pincodeQuery: s.pincodeQuery.slice(0, -1), pincodeFocused: true };
    if (s.pincodeQuery.length >= 6) return {};
    return { pincodeQuery: s.pincodeQuery + key, pincodeFocused: true };
  });
  pickSuggestion = (pin) => this.setState({ pincodeQuery: pin, pincodeFocused: true });

  goBack = () => { window.location.href = '../home/Home Screen.dc.html'; };

  restart = () => { clearTimeout(this._qrTimer); this.setState({ stage: 'map', stepDir: 'back', selectedIdx: 0, followed: {}, loginSheetOpen: false, qrScanning: true, qrPermissionDenied: false, pincodeQuery: '', pincodeFocused: false }); };

  // Tap a storyboard frame → start the journey from that state, per view.
  selectMapFrame = (i) => {
    clearTimeout(this._qrTimer);
    // 0 first result · 1 following · 2 second result · 3 guest sign-in sheet
    const states = [
      { selectedIdx: 0, followed: {}, guest: false, loginSheetOpen: false },
      { selectedIdx: 0, followed: { 0: true }, guest: false, loginSheetOpen: false },
      { selectedIdx: 1, followed: { 0: true }, guest: false, loginSheetOpen: false },
      { selectedIdx: 0, followed: {}, guest: true, loginSheetOpen: true }
    ];
    this.setState({ stage: 'map', stepDir: 'none', ...states[i] });
  };
  selectListFrame = (i) => {
    clearTimeout(this._qrTimer);
    // 0 nearby list · 1 following a masjid
    this.setState({ stage: 'list', stepDir: 'none', guest: false, loginSheetOpen: false, followed: i === 1 ? { 1: true } : {} });
  };
  selectQrFrame = (i) => {
    clearTimeout(this._qrTimer);
    // 0 scanning · 1 masjid found · 2 camera permission denied
    this.setState({ stage: 'qr', stepDir: 'none', guest: false, loginSheetOpen: false, qrScanning: i === 0, qrPermissionDenied: i === 2 });
    if (i === 0) this.startQrScan();
  };
  selectPincodeFrame = (i) => {
    clearTimeout(this._qrTimer);
    // 0 empty · 1 typing (suggestions) · 2 results
    const q = i === 0 ? '' : (i === 1 ? '5600' : '560064');
    this.setState({ stage: 'pincode', stepDir: 'none', guest: false, loginSheetOpen: false, pincodeQuery: q, pincodeFocused: i !== 0 });
  };

  renderVals() {
    const s = this.state;
    const isMap = s.stage === 'map';
    const isList = s.stage === 'list';
    const isQr = s.stage === 'qr';
    const isPincode = s.stage === 'pincode';
    const anyFollowed = Object.keys(s.followed).some(k => s.followed[k]);

    // Map ring — matches map-row.jsx FRAMES (0 · first result, 1 · following, 2 · second result, 3 · guest sheet).
    let mapActive = -1;
    if (isMap) {
      if (s.guest) mapActive = s.loginSheetOpen ? 3 : 0;
      else mapActive = s.selectedIdx === 0 ? (s.followed[0] ? 1 : 0) : 2;
    }

    // List ring — matches list-row.jsx FRAMES (0 · nearby list, 1 · following a masjid).
    const listActive = isList ? (anyFollowed ? 1 : 0) : -1;

    // QR ring — matches qr-row.jsx FRAMES (0 · scanning, 1 · masjid found, 2 · permission denied).
    const qrActive = isQr ? (s.qrPermissionDenied ? 2 : (s.qrScanning ? 0 : 1)) : -1;

    // Pincode ring — matches pincode-row.jsx FRAMES (0 · empty, 1 · typing, 2 · results).
    let pincodeActive = -1;
    if (isPincode) pincodeActive = s.pincodeQuery.length === 6 ? 2 : (s.pincodeFocused ? 1 : 0);

    return {
      isMapStage: isMap,
      isListStage: isList,
      isQrStage: isQr,
      isPincodeStage: isPincode,
      stepAnim: s.stepDir === 'none' ? '' : (s.stepDir === 'back' ? 'step-back' : 'step-fwd'),
      mapActive,
      listActive,
      qrActive,
      pincodeActive,
      restart: this.restart,
      selectMapFrame: this.selectMapFrame,
      selectListFrame: this.selectListFrame,
      selectQrFrame: this.selectQrFrame,
      selectPincodeFrame: this.selectPincodeFrame,

      selectedIdx: s.selectedIdx,
      followed: s.followed,
      guest: s.guest,
      loginSheetOpen: s.loginSheetOpen,
      closeLoginSheet: this.closeLoginSheet,
      loginSheetPrimary: { text: 'Sign in', onClick: this.signIn },
      loginSheetSecondary: { text: 'Cancel', onClick: this.closeLoginSheet },
      selectMasjid: this.selectMasjid,
      toggleFollow: this.toggleFollow,
      recenter: this.recenter,
      onOpenList: this.onOpenList,
      onOpenMap: this.onOpenMap,
      onSearch: this.onSearch,
      onQr: this.onQr,
      goBack: this.goBack,

      qrScanning: s.qrScanning,
      qrPermissionDenied: s.qrPermissionDenied,
      qrFollowing: !!s.followed[this.QR_RESULT_IDX],
      qrDetect: this.qrDetect,
      toggleQrFollow: this.toggleQrFollow,

      pincodeQuery: s.pincodeQuery,
      pincodeFocused: s.pincodeFocused,
      pincodeFocus: this.pincodeFocus,
      pincodePress: this.pincodePress,
      pickSuggestion: this.pickSuggestion,
    };
  }
}
</script>
</body>
</html>
