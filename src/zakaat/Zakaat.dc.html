<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="../support.js"></script>
<script src="../_theme/chrome.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="../_ds/noor-design-system-46f42e91-1858-412f-bdb6-560a6cc3df9f/colors_and_type.css">
  <link rel="stylesheet" href="../_theme/poc.css">
  <link rel="stylesheet" href="../_theme/components.css">
  <script src="../_ds/noor-design-system-46f42e91-1858-412f-bdb6-560a6cc3df9f/_ds_bundle.js"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0..1,0&amp;display=block">
  <link rel="stylesheet" href="../_theme/icons.css">
  <style>
    body{background:var(--canvas-bg);padding:36px 32px 90px;min-height:100vh;box-sizing:border-box}
    ::-webkit-scrollbar{display:none}*{-ms-overflow-style:none;scrollbar-width:none}
    @keyframes stepin { from{transform:translateX(28px);opacity:0} to{transform:translateX(0);opacity:1} }
    @keyframes stepback { from{transform:translateX(-28px);opacity:0} to{transform:translateX(0);opacity:1} }
    .step-fwd { animation:stepin .35s cubic-bezier(.2,.8,.2,1) }
    .step-back { animation:stepback .35s cubic-bezier(.2,.8,.2,1) }
  </style>
</helmet>

<!-- Pre-load Home components for storyboard row and live device (hidden from rendering) -->
<div style="display: none">
  <x-import component="PromptCard" from="../_theme/components.jsx" hint-size="0,0"></x-import>
  <x-import component="BottomNav" from="../home/storyboards/nav-bar.jsx" hint-size="0,0"></x-import>
  <x-import component="HomeScreen" from="../home/storyboards/screens.jsx" hint-size="0,0"></x-import>
</div>

<!-- ── Page header ── -->
<x-import component="BoardHeader" from="../_theme/board.jsx"
          title="Zakaat — 6-Step Calculator"
          subtitle="One board, one flow. The device on the right runs the interactive prototype; the board follows its state."
          hint-size="1440px,92px"></x-import>

<!-- ── Board ── -->
<div class="poc-stage">

  <!-- Static storyboard rows -->
  <div class="poc-frames">
    <x-import component="ZakaatRow" from="./storyboards/zakaat-row.jsx"
              section="steps"
              active="{{ zakaatActive }}"
              on-select-frame="{{ selectFrame }}"
              hint-size="760px,600px">
    </x-import>
    <x-import component="ZakaatRow" from="./storyboards/zakaat-row.jsx"
              section="summary"
              active="{{ zakaatActive }}"
              on-select-frame="{{ selectFrame }}"
              hint-size="760px,600px">
    </x-import>
  </div>

  <!-- Live interactive device -->
  <x-import component="BoardLive" from="../_theme/board.jsx"
            restart="{{ restart }}"
            hint="Click 'Calculate Zakaat' to start. Enter values to compute Zakaat Due in real time."
            hint-size="400px,900px">
    <x-import component="IOSDevice" from="../ios-frame.jsx" hint-size="402px,874px">
      <div style="width:100%;height:100%;position:relative;overflow:hidden;background:var(--color-surface-primary)">

        <!-- ════ STAGE · HOME ════ -->
        <sc-if value="{{ isStageHome }}">
          <div class="{{ stepAnim }}" style="position:absolute;inset:0;display:flex;flex-direction:column">
            <div style="flex:1;position:relative;overflow:hidden">
              <x-import component="HomeScreen" from="../home/storyboards/screens.jsx"
                        go-zakaat="{{ goZakaatStage }}"
                        go-hijri="{{ goHijri }}"
                        go-asma="{{ goAsma }}"
                        go-dua="{{ goDua }}"
                        hint-size="100%,100%">
              </x-import>
            </div>
            <x-import component="BottomNav" from="../home/storyboards/nav-bar.jsx"
                      active-index="0"
                      hint-size="100%,84px">
            </x-import>
          </div>
        </sc-if>

        <!-- ════ STAGE · EMPTY ════ -->
        <sc-if value="{{ isStageEmpty }}">
          <div class="{{ stepAnim }}" style="position:absolute;inset:0">
            <x-import component="ZakaatEmptyScreen" from="./storyboards/screens.jsx"
                      on-calculate="{{ startCalculating }}"
                      on-back="{{ goHome }}"
                      hint-size="100%,100%">
            </x-import>
          </div>
        </sc-if>

        <!-- ════ STAGE · LIST ════ -->
        <sc-if value="{{ isStageList }}">
          <div class="{{ stepAnim }}" style="position:absolute;inset:0">
            <x-import component="ZakaatListScreen" from="./storyboards/screens.jsx"
                      records="{{ records }}"
                      on-calculate="{{ startCalculating }}"
                      on-edit="{{ editRecord }}"
                      on-back="{{ goHome }}"
                      hint-size="100%,100%">
            </x-import>
          </div>
        </sc-if>

        <!-- ════ STAGE · LOADING ════ -->
        <sc-if value="{{ isStageLoading }}">
          <div class="{{ stepAnim }}" style="position:absolute;inset:0">
            <x-import component="ZakaatLoadingScreen" from="./storyboards/screens.jsx"
                      hint-size="100%,100%">
            </x-import>
          </div>
        </sc-if>

        <!-- ════ STAGE · STEPS 1-6 ════ -->
        <sc-if value="{{ isStageStep }}">
          <div class="{{ stepAnim }}" style="position:absolute;inset:0">
            <x-import component="ZakaatStepScreen" from="./storyboards/screens.jsx"
                      step="{{ stepNum }}"
                      values="{{ values }}"
                      active-field="{{ activeField }}"
                      on-field-focus="{{ selectField }}"
                      on-key-press="{{ handleKeyPress }}"
                      on-next="{{ nextStep }}"
                      on-prev="{{ prevStep }}"
                      on-back="{{ goBack }}"
                      on-close-keypad="{{ closeKeypad }}"
                      hint-size="100%,100%">
            </x-import>
          </div>
        </sc-if>

        <!-- ════ STAGE · SUMMARY ════ -->
        <sc-if value="{{ isStageSummary }}">
          <div class="{{ stepAnim }}" style="position:absolute;inset:0">
            <x-import component="ZakaatSummaryScreen" from="./storyboards/screens.jsx"
                      values="{{ values }}"
                      on-back="{{ goBack }}"
                      on-save="{{ saveRecord }}"
                      hint-size="100%,100%">
            </x-import>
          </div>
        </sc-if>

      </div>
    </x-import>
  </x-import>

</div>
</x-dc>

<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {
    stage: location.hash === '#calculate' ? 'empty' : 'home', // 'home' | 'empty' | 'list' | 'loading' | 'step' | 'summary'
    stepNum: 1,
    activeField: null,
    stepDir: 'fwd',
    records: [],
    editingRecordId: null,
    values: {
      gold: '', silver: '',
      cash: '', bank: '',
      stocks: '', mutualFunds: '', crypto: '',
      businessAssets: '', liveStock: '', agri: '',
      receivables: '', otherAssets: '',
      debts: '', taxes: '', liabilities: ''
    }
  };

  startCalculating = () => {
    this.setState({ stage: 'loading', stepDir: 'fwd', editingRecordId: null });
    setTimeout(() => {
      this.setState({ stage: 'step', stepNum: 1, stepDir: 'fwd' });
    }, 1500);
  };

  editRecord = (record) => {
    this.setState({
      values: { ...record.values },
      stage: 'step',
      stepNum: 1,
      activeField: null,
      stepDir: 'fwd',
      editingRecordId: record.id
    });
  };

  selectField = (key) => {
    this.setState({ activeField: key });
  };

  closeKeypad = () => {
    this.setState({ activeField: null });
  };

  handleKeyPress = (char) => {
    this.setState(s => {
      if (!s.activeField) return {};
      const current = s.values[s.activeField] || '';
      let updated = current;

      if (char === 'backspace') {
        updated = current.slice(0, -1);
      } else if (char === '.') {
        if (!current.includes('.')) {
          updated = current + '.';
        }
      } else {
        if (current.length < 9) {
          updated = current + char;
        }
      }

      return {
        values: { ...s.values, [s.activeField]: updated }
      };
    });
  };

  nextStep = () => {
    this.setState(s => {
      if (s.stepNum < 6) {
        return { stepNum: s.stepNum + 1, activeField: null, stepDir: 'fwd' };
      } else {
        return { stage: 'summary', activeField: null, stepDir: 'fwd' };
      }
    });
  };

  prevStep = () => {
    this.setState(s => {
      if (s.stepNum > 1) {
        return { stepNum: s.stepNum - 1, activeField: null, stepDir: 'back' };
      }
      return {};
    });
  };

  goBack = () => {
    this.setState(s => {
      if (s.stage === 'summary') {
        return { stage: 'step', stepNum: 6, stepDir: 'back' };
      }
      if (s.stage === 'step') {
        if (s.stepNum > 1) {
          return { stepNum: s.stepNum - 1, stepDir: 'back' };
        } else {
          return { stage: s.records.length > 0 ? 'list' : 'empty', stepDir: 'back' };
        }
      }
      return {};
    });
  };

  goHome = () => {
    this.setState({ stage: 'home', stepDir: 'back' });
  };

  goZakaatStage = () => {
    this.setState(s => ({ stage: s.records.length > 0 ? 'list' : 'empty', stepDir: 'fwd' }));
  };

  goHijri = () => {
    window.location.href = '../hijri/Hijri.dc.html#calendar';
  };

  goAsma = () => {
    window.location.href = '../asma-ul-husna/Asma ul Husna.dc.html';
  };

  goDua = () => {
    window.location.href = '../dua-dikhr/Dua & Dikhr.dc.html#categories';
  };

  saveRecord = () => {
    this.setState(s => {
      const parseVal = (v) => parseFloat(v || 0);

      const goldGrams = parseVal(s.values.gold);
      const silverGrams = parseVal(s.values.silver);
      const cash = parseVal(s.values.cash);
      const bank = parseVal(s.values.bank);
      const stocks = parseVal(s.values.stocks);
      const mutualFunds = parseVal(s.values.mutualFunds);
      const crypto = parseVal(s.values.crypto);
      const businessAssets = parseVal(s.values.businessAssets);
      const liveStock = parseVal(s.values.liveStock);
      const agri = parseVal(s.values.agri);
      const receivables = parseVal(s.values.receivables);
      const otherAssets = parseVal(s.values.otherAssets);

      const debts = parseVal(s.values.debts);
      const taxes = parseVal(s.values.taxes);
      const liabilities = parseVal(s.values.liabilities);

      const GOLD_RATE = 14133.0;
      const SILVER_RATE = 25.0;
      const goldVal = goldGrams * GOLD_RATE;
      const silverVal = silverGrams * SILVER_RATE;
      const totalAssets = goldVal + silverVal + cash + bank + stocks + mutualFunds + crypto + businessAssets + liveStock + agri + receivables + otherAssets;
      const deductiblesTotal = debts + taxes + liabilities;
      const netWealth = Math.max(0, totalAssets - deductiblesTotal);
      const zakaatDue = netWealth * 0.025;

      const formatOrdinal = (day) => {
        if (day > 3 && day < 21) return day + 'th';
        switch (day % 10) {
          case 1:  return day + 'st';
          case 2:  return day + 'nd';
          case 3:  return day + 'rd';
          default: return day + 'th';
        }
      };
      const now = new Date();
      const formattedDate = `${now.toLocaleDateString('en-US', { month: 'short' })} ${formatOrdinal(now.getDate())}, ${now.getFullYear()}`;

      const updatedRecords = [...s.records];
      const matchIdx = updatedRecords.findIndex(r => r.id === s.editingRecordId);

      const newRecord = {
        id: s.editingRecordId || Date.now(),
        name: matchIdx !== -1 ? updatedRecords[matchIdx].name : `Zakaat ${updatedRecords.length + 1}`,
        due: zakaatDue,
        date: formattedDate,
        values: { ...s.values }
      };

      if (matchIdx !== -1) {
        updatedRecords[matchIdx] = newRecord;
      } else {
        updatedRecords.push(newRecord);
      }

      return {
        records: updatedRecords,
        stage: 'list',
        editingRecordId: null,
        stepNum: 1,
        activeField: null,
        stepDir: 'back',
        values: {
          gold: '', silver: '',
          cash: '', bank: '',
          stocks: '', mutualFunds: '', crypto: '',
          businessAssets: '', liveStock: '', agri: '',
          receivables: '', otherAssets: '',
          debts: '', taxes: '', liabilities: ''
        }
      };
    });
  };

  restart = () => {
    this.setState(s => ({
      stage: 'home',
      stepNum: 1,
      activeField: null,
      stepDir: 'back',
      editingRecordId: null,
      values: {
        gold: '', silver: '',
        cash: '', bank: '',
        stocks: '', mutualFunds: '', crypto: '',
        businessAssets: '', liveStock: '', agri: '',
        receivables: '', otherAssets: '',
        debts: '', taxes: '', liabilities: ''
      }
    }));
  };

  selectFrame = (i) => {
    if (i === 0) {
      this.setState({ stage: 'home', stepDir: 'back' });
    } else if (i === 1) {
      this.setState({ stage: 'empty', stepDir: 'fwd' });
    } else if (i === 2) {
      this.setState({ stage: 'list', records: [{ id: 1, name: 'Zakaat 1', due: 0, date: 'Jul 10th, 2026', values: {} }], stepDir: 'fwd' });
    } else if (i === 3) {
      this.setState({ stage: 'loading', stepDir: 'fwd' });
    } else if (i >= 4 && i <= 9) {
      this.setState({
        stage: 'step',
        stepNum: i - 3,
        activeField: i === 5 ? 'bank' : null,
        values: i === 5 ? { cash: '100', bank: '15' } : this.state.values,
        stepDir: 'fwd'
      });
    } else if (i === 10) {
      this.setState({ stage: 'summary', values: {}, stepDir: 'fwd' });
    } else if (i === 11) {
      this.setState({
        stage: 'summary',
        values: { gold: '10', silver: '500', cash: '25000', bank: '45000', stocks: '15000', debts: '5000' },
        stepDir: 'fwd'
      });
    }
  };

  renderVals() {
    const s = this.state;

    // Compute active frame index on the board
    let zakaatActive = -1;
    if (s.stage === 'home') {
      zakaatActive = 0;
    } else if (s.stage === 'empty') {
      zakaatActive = 1;
    } else if (s.stage === 'list') {
      zakaatActive = 2;
    } else if (s.stage === 'loading') {
      zakaatActive = 3;
    } else if (s.stage === 'step') {
      zakaatActive = s.stepNum + 3;
    } else if (s.stage === 'summary') {
      const isSample = Object.values(s.values).some(v => v !== '' && parseFloat(v) > 0);
      zakaatActive = isSample ? 11 : 10;
    }

    return {
      zakaatActive,
      isStageHome: s.stage === 'home',
      isStageEmpty: s.stage === 'empty',
      isStageList: s.stage === 'list',
      isStageLoading: s.stage === 'loading',
      isStageStep: s.stage === 'step',
      isStageSummary: s.stage === 'summary',
      records: s.records || [],
      stepNum: s.stepNum,
      activeField: s.activeField,
      values: s.values,
      stepAnim: s.stepDir === 'fwd' ? 'step-fwd' : s.stepDir === 'back' ? 'step-back' : '',
      startCalculating: this.startCalculating,
      editRecord: this.editRecord,
      selectField: this.selectField,
      closeKeypad: this.closeKeypad,
      handleKeyPress: this.handleKeyPress,
      nextStep: this.nextStep,
      prevStep: this.prevStep,
      goBack: this.goBack,
      goHome: this.goHome,
      goZakaatStage: this.goZakaatStage,
      goHijri: this.goHijri,
      goAsma: this.goAsma,
      goDua: this.goDua,
      saveRecord: this.saveRecord,
      restart: this.restart,
      selectFrame: this.selectFrame
    };
  }
}
</script>
</body>
</html>
