<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/noor-design-system-46f42e91-1858-412f-bdb6-560a6cc3df9f/colors_and_type.css">
  <script src="_ds/noor-design-system-46f42e91-1858-412f-bdb6-560a6cc3df9f/_ds_bundle.js"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0..1,0&amp;display=block">
  <link rel="stylesheet" href="_theme/icons.css">
  <style>
    body{background:#E8E4DE;display:flex;justify-content:center;align-items:flex-start;padding:40px 20px 60px;min-height:100vh;box-sizing:border-box}
    ::-webkit-scrollbar{display:none}*{-ms-overflow-style:none;scrollbar-width:none}
  </style>
</helmet>

<div style="display:flex;flex-direction:column;align-items:center;gap:12px">
  <div style="font:600 11px/1 system-ui;color:rgba(60,50,40,.42);letter-spacing:.08em;text-transform:uppercase">Explore Masjids · Paigham app</div>

  <x-import component="IOSDevice" from="./ios-frame.jsx" dark="" hint-size="402px,874px">
    <div style="width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;background:#1A2030;position:relative">

      <!-- Map background -->
      <div style="position:absolute;inset:0;background:#1C2535;overflow:hidden">
        <!-- Road network -->
        <svg width="100%" height="100%" viewBox="0 0 390 700" style="position:absolute;inset:0;opacity:0.6">
          <!-- Major roads -->
          <line x1="0" y1="300" x2="390" y2="300" stroke="#2A3545" stroke-width="12"/>
          <line x1="0" y1="420" x2="390" y2="360" stroke="#2A3545" stroke-width="10"/>
          <line x1="195" y1="0" x2="195" y2="700" stroke="#2A3545" stroke-width="10"/>
          <line x1="80" y1="0" x2="80" y2="700" stroke="#252F40" stroke-width="6"/>
          <line x1="310" y1="0" x2="310" y2="700" stroke="#252F40" stroke-width="6"/>
          <line x1="0" y1="180" x2="390" y2="180" stroke="#252F40" stroke-width="6"/>
          <line x1="0" y1="500" x2="390" y2="500" stroke="#252F40" stroke-width="6"/>
          <!-- Diagonal roads -->
          <line x1="0" y1="100" x2="300" y2="400" stroke="#252F40" stroke-width="4"/>
          <line x1="100" y1="0" x2="390" y2="450" stroke="#252F40" stroke-width="4"/>
          <!-- Water body -->
          <ellipse cx="120" cy="380" rx="70" ry="45" fill="#1A3050" opacity="0.9"/>
          <text x="110" y="385" fill="rgba(100,150,200,0.7)" font-size="10" font-family="sans-serif">Attur Lake</text>
          <!-- Green area -->
          <rect x="280" y="480" width="80" height="60" rx="4" fill="rgba(0,100,40,0.35)"/>
          <!-- Road labels -->
          <text x="200" y="296" fill="rgba(200,210,220,0.5)" font-size="9" font-family="sans-serif" text-anchor="middle">1ST MAIN ROAD</text>
          <text x="30" y="350" fill="rgba(200,210,220,0.5)" font-size="8" font-family="sans-serif" transform="rotate(-90,30,350)">BETTAHALLI ROAD</text>
          <text x="140" y="430" fill="rgba(200,210,220,0.5)" font-size="8" font-family="sans-serif">YASWANTPUR ROAD</text>
        </svg>
        <!-- User location dot -->
        <div style="position:absolute;left:50%;top:38%;transform:translate(-50%,-50%);width:16px;height:16px;border-radius:50%;background:#4A8AFF;border:3px solid rgba(255,255,255,0.9);box-shadow:0 0 0 6px rgba(74,138,255,0.2)"></div>
        <!-- Masjid pins -->
        <div style="position:absolute;left:47%;top:32%;transform:translate(-50%,-100%)">
          <div style="width:34px;height:34px;border-radius:50% 50% 50% 0;background:#fff;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.4)">
            <span style="transform:rotate(45deg);font-size:14px">🕌</span>
          </div>
        </div>
        <div style="position:absolute;left:72%;top:42%;transform:translate(-50%,-100%)">
          <div style="width:28px;height:28px;border-radius:50% 50% 50% 0;background:#C9AD7B;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.4)">
            <span style="transform:rotate(45deg);font-size:11px">🕌</span>
          </div>
        </div>
        <!-- Cluster pin -->
        <div style="position:absolute;left:28%;top:65%;transform:translate(-50%,-50%);width:28px;height:28px;border-radius:50%;background:#E05040;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,0.4)">
          <span style="font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:#fff">2</span>
        </div>
        <!-- QC/horticulture -->
        <div style="position:absolute;right:10%;bottom:28%;width:32px;height:32px;border-radius:50%;background:var(--color-action-primary);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,0.3)">
          <span class="mi" style="font-size:18px;color:#fff" data-i="my_location"></span>
        </div>
      </div>

      <!-- AppBar overlay -->
      <div style="flex-shrink:0;display:flex;align-items:center;gap:10px;padding:12px 16px 10px;position:relative;z-index:10">
        <x-import component-from-global-scope="TonalIconButton" icon="arrow_back" color="#FFFFFF" size="sm" hint-size="32px,32px"></x-import>
        <span style="font-family:'Nunito',sans-serif;font-size:18px;font-weight:800;color:var(--color-info-primary);flex:1;text-shadow:0 1px 4px rgba(0,0,0,0.5)">Explore Masjids</span>
        <x-import component-from-global-scope="TonalIconButton" icon="search" color="#FFFFFF" size="sm" hint-size="32px,32px"></x-import>
        <x-import component-from-global-scope="TonalIconButton" icon="qr_code_scanner" color="#FFFFFF" size="sm" hint-size="32px,32px"></x-import>
      </div>

      <div style="flex:1"></div>

      <!-- Bottom panel -->
      <div style="flex-shrink:0;background:rgba(9,9,11,0.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:24px 24px 0 0;padding:14px 16px 20px;position:relative;z-index:10">
        <!-- Handle -->
        <div style="display:flex;justify-content:center;margin-bottom:12px">
          <div style="width:36px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px"></div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
          <span style="font-family:'Nunito',sans-serif;font-size:20px;font-weight:800;color:#fff">44 Masjids Nearby</span>
          <span class="mi" style="font-size:24px;color:var(--color-action-primary)" data-i="format_list_bulleted"></span>
        </div>
        <div style="font-family:'Nunito',sans-serif;font-size:13px;color:rgba(255,255,255,0.45);margin-bottom:14px">Follow masjids to get prayer time notifications</div>

        <!-- Masjid card -->
        <div style="background:#131417;border-radius:16px;padding:14px;border:1px solid var(--color-neutral-border)">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
            <div style="width:40px;height:40px;border-radius:50%;background:#1A5E30;display:flex;align-items:center;justify-content:center;flex-shrink:0">
              <span style="font-family:'Nunito',sans-serif;font-size:16px;font-weight:700;color:#fff">M</span>
            </div>
            <div style="flex:1;min-width:0">
              <div style="font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;color:#fff">Madeena Musalla Attur</div>
              <div style="font-family:'Nunito',sans-serif;font-size:12px;color:rgba(255,255,255,0.45)">Yelahanka - 560064 · 582m</div>
            </div>
            <x-import component-from-global-scope="TonalButton" color="#FFFFFF" size="sm" expanded="{{ false }}" hint-size="70px,32px">Follow</x-import>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between">
            <div>
              <div style="font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;color:var(--color-action-primary)">Isha</div>
              <div style="font-family:'Nunito',sans-serif;font-size:12px;color:rgba(255,255,255,0.5)">Azaan 8:15 PM · Iqama 8:30 PM</div>
            </div>
            <x-import component-from-global-scope="TonalIconButton" icon="near_me" color="#FFFFFF" size="sm" hint-size="32px,32px"></x-import>
          </div>
        </div>

        <!-- Dots -->
        <div style="display:flex;justify-content:center;gap:5px;margin-top:12px">
          <div style="width:20px;height:4px;border-radius:2px;background:#fff"></div>
          <div style="width:6px;height:4px;border-radius:2px;background:rgba(255,255,255,0.25)"></div>
          <div style="width:6px;height:4px;border-radius:2px;background:rgba(255,255,255,0.25)"></div>
          <div style="width:6px;height:4px;border-radius:2px;background:rgba(255,255,255,0.25)"></div>
          <div style="width:6px;height:4px;border-radius:2px;background:rgba(255,255,255,0.25)"></div>
        </div>
      </div>

    </div>
  </x-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {}
</script>
</body>
</html>
