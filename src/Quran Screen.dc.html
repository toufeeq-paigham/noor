<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<script src="./_theme/chrome.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/noor-design-system-46f42e91-1858-412f-bdb6-560a6cc3df9f/colors_and_type.css">
  <link rel="stylesheet" href="_theme/poc.css">
  <script src="_ds/noor-design-system-46f42e91-1858-412f-bdb6-560a6cc3df9f/_ds_bundle.js"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0..1,0&amp;display=block">
  <style>
    @font-face{font-family:'QWBWSurah';src:url('_ds/noor-design-system-46f42e91-1858-412f-bdb6-560a6cc3df9f/fonts/QWBWSurah.ttf') format('truetype')}
    body{background:var(--canvas-bg);display:flex;justify-content:center;align-items:flex-start;padding:40px 20px 60px;min-height:100vh;box-sizing:border-box}
    ::-webkit-scrollbar{display:none}*{-ms-overflow-style:none;scrollbar-width:none}
  </style>
</helmet>

<div style="display:flex;flex-direction:column;align-items:center;gap:12px">
  <div style="font:600 11px/1 system-ui;color:var(--canvas-label);letter-spacing:.08em;text-transform:uppercase">Quran screen · Paigham app</div>

  <x-import component="IOSDevice" from="./ios-frame.jsx" hint-size="402px,874px">
    <div style="width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;background:var(--color-surface-primary)">

      <!-- AppBar -->
      <div style="flex-shrink:0;padding:16px 20px 12px;background:var(--color-surface-primary)">
        <div style="font-family:'Nunito',sans-serif;font-size:28px;font-weight:800;color:var(--color-info-primary)">Quran</div>
      </div>

      <!-- Tab bar (Surah / Juz) -->
      <div style="flex-shrink:0;padding:0 16px 14px;background:var(--color-surface-primary)">
        <div style="display:flex;background:var(--color-action-background);border-radius:16px;padding:4px;gap:2px">
          <sc-for list="{{ tabs }}" as="t" hint-placeholder-count="2">
            <div onClick="{{ t.onSelect }}" style="flex:1;text-align:center;background:{{ t.bg }};border-radius:12px;padding:8px 0;cursor:pointer;transition:background 200ms">
              <span style="font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:{{ t.color }}">{{ t.label }}</span>
            </div>
          </sc-for>
        </div>
      </div>

      <!-- Lists -->
      <div id="list-surah" style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 16px">

        <sc-if value="{{ isSurahTab }}">
          <div style="display:flex;flex-direction:column;gap:8px">

            <!-- Continue reading card -->
            <div onClick="{{ openReader }}" style="background:var(--color-action-primary);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;box-shadow:var(--shadow-button)">
              <div style="width:40px;height:40px;border-radius:50%;background:color-mix(in oklab, var(--color-action-primary-inverse) 18%, transparent);flex-shrink:0;display:flex;align-items:center;justify-content:center">
                <span class="material-symbols-rounded" style="font-size:22px;color:var(--color-action-primary-inverse);font-variation-settings:'FILL' 1">play_arrow</span>
              </div>
              <div style="flex:1;min-width:0">
                <div style="font-family:'Nunito',sans-serif;font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:color-mix(in oklab, var(--color-action-primary-inverse) 80%, transparent)">Continue reading</div>
                <div style="font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;color:var(--color-action-primary-inverse);margin-top:1px">{{ contName }}</div>
                <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
                  <div style="flex:1;height:4px;border-radius:2px;background:color-mix(in oklab, var(--color-action-primary-inverse) 25%, transparent);overflow:hidden">
                    <div style="width:{{ contPctW }};height:100%;border-radius:2px;background:var(--color-action-primary-inverse);transition:width 300ms"></div>
                  </div>
                  <span style="font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;color:color-mix(in oklab, var(--color-action-primary-inverse) 80%, transparent)">{{ contMeta }}</span>
                </div>
              </div>
              <span class="material-symbols-rounded" style="font-size:20px;color:var(--color-action-primary-inverse)">chevron_right</span>
            </div>

            <!-- Surah rows -->
            <sc-for list="{{ surahs }}" as="s" hint-placeholder-count="7">
              <div onClick="{{ s.onSelect }}" style="background:{{ s.bg }};border:1px solid {{ s.borderColor }};border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background 200ms,border-color 200ms">
                <div style="width:40px;height:40px;border-radius:50%;background:var(--color-action-primary);flex-shrink:0;display:flex;align-items:center;justify-content:center"><span style="font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;color:var(--color-action-primary-inverse)">{{ s.n }}</span></div>
                <div style="flex:1;min-width:0">
                  <div style="font-family:'Nunito',sans-serif;font-size:16px;font-weight:700;color:var(--color-info-primary)">{{ s.name }}</div>
                  <div style="font-family:'Nunito',sans-serif;font-size:12px;color:var(--color-info-secondary)">{{ s.sub }}</div>
                </div>
                <div style="text-align:right">
                  <div style="font-family:'QWBWSurah',serif;font-size:20px;color:color-mix(in oklab, var(--color-info-primary) 82%, transparent);direction:rtl;line-height:1.2">{{ s.arabic }}</div>
                  <div style="font-family:'Nunito',sans-serif;font-size:11px;color:var(--color-status-disabled-alt);margin-top:2px">{{ s.place }}</div>
                </div>
              </div>
            </sc-for>
          </div>
        </sc-if>

        <sc-if value="{{ isJuzTab }}">
          <div style="display:flex;flex-direction:column;gap:8px">
            <sc-for list="{{ juzList }}" as="j" hint-placeholder-count="10">
              <div onClick="{{ j.onSelect }}" style="background:{{ j.bg }};border:1px solid {{ j.borderColor }};border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background 200ms,border-color 200ms">
                <div style="width:40px;height:40px;border-radius:50%;background:var(--color-action-primary);flex-shrink:0;display:flex;align-items:center;justify-content:center"><span style="font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;color:var(--color-action-primary-inverse)">{{ j.n }}</span></div>
                <div style="flex:1;min-width:0">
                  <div style="font-family:'Nunito',sans-serif;font-size:16px;font-weight:700;color:var(--color-info-primary)">{{ j.title }}</div>
                  <div style="font-family:'Nunito',sans-serif;font-size:12px;color:var(--color-info-secondary)">{{ j.name }}</div>
                </div>
                <span class="material-symbols-rounded" style="font-size:20px;color:var(--color-status-disabled-alt)">chevron_right</span>
              </div>
            </sc-for>
          </div>
        </sc-if>

      </div>

      <!-- Bottom nav -->
      <div style="flex-shrink:0;display:flex;background:color-mix(in oklab, var(--color-surface-primary) 96%, transparent);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--color-neutral-border);padding:8px 0 20px">
        <div onClick="{{ goHome }}" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer"><span class="material-symbols-rounded" style="font-size:24px;color:var(--color-status-disabled-alt)">home</span><span style="font-family:'Nunito',sans-serif;font-size:10px;color:var(--color-status-disabled-alt)">Home</span></div>
        <div onClick="{{ goQaum }}" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer"><span class="material-symbols-rounded" style="font-size:24px;color:var(--color-status-disabled-alt)">group</span><span style="font-family:'Nunito',sans-serif;font-size:10px;color:var(--color-status-disabled-alt)">Qaum</span></div>
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative">
          <div style="position:absolute;top:-6px;width:48px;height:6px;background:radial-gradient(ellipse,color-mix(in oklab, var(--color-action-primary) 45%, transparent) 0%,transparent 70%);border-radius:50%"></div>
          <span class="material-symbols-rounded" style="font-size:24px;color:var(--color-action-primary);font-variation-settings:'FILL' 1">menu_book</span><span style="font-family:'Nunito',sans-serif;font-size:10px;font-weight:600;color:var(--color-action-primary)">Quran</span>
        </div>
        <div onClick="{{ goSalaah }}" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer"><span class="material-symbols-rounded" style="font-size:24px;color:var(--color-status-disabled-alt)">mosque</span><span style="font-family:'Nunito',sans-serif;font-size:10px;color:var(--color-status-disabled-alt)">Salaah</span></div>
        <div onClick="{{ goProfile }}" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer"><span class="material-symbols-rounded" style="font-size:24px;color:var(--color-status-disabled-alt)">person</span><span style="font-family:'Nunito',sans-serif;font-size:10px;color:var(--color-status-disabled-alt)">Profile</span></div>
      </div>

    </div>
  </x-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {
    tab: 0,
    selected: 0,
    selectedJuz: 0,
    lastRead: { name: "Al-Kahf", ayah: 45, total: 110 },
  };

  surahData = [
    { n: 1,  name: "Al-Faatiha",   tr: "The Opener",        ayahs: 7,   place: "Makkah",  arabic: "سُورَةُ الْفَاتِحَةِ" },
    { n: 2,  name: "Al-Baqara",    tr: "The Cow",           ayahs: 286, place: "Madinah", arabic: "سُورَةُ الْبَقَرَةِ" },
    { n: 3,  name: "Aal-i-Imraan", tr: "Family of Imran",   ayahs: 200, place: "Madinah", arabic: "سُورَةُ الِعِمْرَانِ" },
    { n: 4,  name: "An-Nisaa",     tr: "The Women",         ayahs: 176, place: "Madinah", arabic: "سُورَةُ النِّسَاءِ" },
    { n: 5,  name: "Al-Maaida",    tr: "The Table Spread",  ayahs: 120, place: "Madinah", arabic: "سُورَةُ الْمَائِدَةِ" },
    { n: 6,  name: "Al-An'aam",    tr: "The Cattle",        ayahs: 165, place: "Makkah",  arabic: "سُورَةُ الأَنْعَامِ" },
    { n: 7,  name: "Al-A'raf",     tr: "The Heights",       ayahs: 206, place: "Makkah",  arabic: "سُورَةُ الأَعْرَافِ" },
    { n: 8,  name: "Al-Anfaal",    tr: "The Spoils of War", ayahs: 75,  place: "Madinah", arabic: "سُورَةُ الأَنفَالِ" },
    { n: 9,  name: "At-Tawba",     tr: "The Repentance",    ayahs: 129, place: "Madinah", arabic: "سُورَةُ التَّوْبَةِ" },
    { n: 10, name: "Yunus",        tr: "Jonas",             ayahs: 109, place: "Makkah",  arabic: "سُورَةُ يُونُسَ" },
    { n: 11, name: "Hud",          tr: "Hud",               ayahs: 123, place: "Makkah",  arabic: "سُورَةُ هُودٍ" },
    { n: 12, name: "Yusuf",        tr: "Joseph",            ayahs: 111, place: "Makkah",  arabic: "سُورَةُ يُوسُفَ" },
    { n: 13, name: "Ar-Ra'd",      tr: "The Thunder",       ayahs: 43,  place: "Madinah", arabic: "سُورَةُ الرَّعْدِ" },
    { n: 14, name: "Ibrahim",      tr: "Abraham",           ayahs: 52,  place: "Makkah",  arabic: "سُورَةُ إِبْرَاهِيمَ" },
    { n: 15, name: "Al-Hijr",      tr: "The Rock",          ayahs: 99,  place: "Makkah",  arabic: "سُورَةُ الْحِجْرِ" },
    { n: 16, name: "An-Nahl",      tr: "The Bee",           ayahs: 128, place: "Makkah",  arabic: "سُورَةُ النَّحْلِ" },
    { n: 17, name: "Al-Israa",     tr: "The Night Journey", ayahs: 111, place: "Makkah",  arabic: "سُورَةُ الإِسْرَاءِ" },
    { n: 18, name: "Al-Kahf",      tr: "The Cave",          ayahs: 110, place: "Makkah",  arabic: "سُورَةُ الْكَهْفِ" },
  ];

  juzNames = [
    "Alif Lam Meem", "Sayaqool", "Tilkal Rusul", "Lan Tanaloo", "Wal Mohsanat",
    "La Yuhibbullah", "Wa Iza Samiu", "Wa Lau Annana", "Qalal Malao", "Wa A'lamu",
    "Yatazeroon", "Wa Mamin Da'abat", "Wa Ma Ubarriu", "Rubama", "Subhanallazi",
    "Qal Alam", "Iqtaraba", "Qad Aflaha", "Wa Qalallazina", "A'man Khalaq",
    "Utlu Ma Oohi", "Wa Manyaqnut", "Wa Mali", "Faman Azlam", "Elahe Yuruddo",
    "Ha Meem", "Qala Fama Khatbukum", "Qad Sami Allah", "Tabarakallazi", "Amma Yatasa'aloon",
  ];

  cardBg       = "color-mix(in srgb, var(--color-surface-primary) 94%, var(--color-action-primary) 6%)";
  cardBgSel    = "color-mix(in srgb, var(--color-surface-primary) 80%, var(--color-action-primary) 20%)";
  cardBorder   = "color-mix(in oklab, var(--color-action-primary) 22%, transparent)";
  cardBorderSel = "var(--color-action-primary)";

  setTab = (i) => () => this.setState({ tab: i });
  go = (p) => () => { window.location.href = p; };
  openReader = () => { window.location.href = "Quran Reader.dc.html"; };

  selectSurah = (x) => () => {
    this.setState({ selected: x.n, lastRead: { name: x.name, ayah: 1, total: x.ayahs } });
    setTimeout(() => { window.location.href = "Quran Reader.dc.html"; }, 380);
  };

  selectJuz = (n) => () => {
    this.setState({ selectedJuz: n });
    setTimeout(() => { window.location.href = "Quran Reader.dc.html"; }, 380);
  };

  renderVals() {
    const s = this.state;

    const tabs = ["Surah", "Juz"].map((label, i) => ({
      label,
      bg: s.tab === i ? "var(--color-action-primary)" : "transparent",
      color: s.tab === i ? "var(--color-action-primary-inverse)" : "var(--color-status-disabled-alt)",
      onSelect: this.setTab(i),
    }));

    const surahs = this.surahData.map((x) => ({
      ...x,
      sub: x.tr + " · " + x.ayahs + " ayahs",
      bg: s.selected === x.n ? this.cardBgSel : this.cardBg,
      borderColor: s.selected === x.n ? this.cardBorderSel : this.cardBorder,
      onSelect: this.selectSurah(x),
    }));

    const juzList = this.juzNames.map((name, i) => ({
      n: i + 1,
      title: "Juz " + (i + 1),
      name,
      bg: s.selectedJuz === i + 1 ? this.cardBgSel : this.cardBg,
      borderColor: s.selectedJuz === i + 1 ? this.cardBorderSel : this.cardBorder,
      onSelect: this.selectJuz(i + 1),
    }));

    const pct = Math.round((s.lastRead.ayah / s.lastRead.total) * 100);

    return {
      tabs,
      isSurahTab: s.tab === 0,
      isJuzTab: s.tab === 1,
      surahs,
      juzList,
      contName: s.lastRead.name,
      contMeta: "Ayah " + s.lastRead.ayah + " of " + s.lastRead.total,
      contPctW: pct + "%",
      openReader: this.openReader,
      goHome: this.go("Home Screen.dc.html"),
      goQaum: this.go("Qaum Screen.dc.html"),
      goSalaah: this.go("Salaah Screen.dc.html"),
      goProfile: this.go("Profile Screen.dc.html"),
    };
  }
}
</script>
</body>
</html>
