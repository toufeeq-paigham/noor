<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="../support.js"></script>
<script src="../_theme/chrome.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="../_ds/noor-design-system-46f42e91-1858-412f-bdb6-560a6cc3df9f/colors_and_type.css">
  <link rel="stylesheet" href="../_theme/poc.css">
  <link rel="stylesheet" href="../_theme/components.css">
  <link rel="stylesheet" href="../_theme/icons.css">
  <link rel="stylesheet" href="./hijri.css">
  <script src="../_ds/noor-design-system-46f42e91-1858-412f-bdb6-560a6cc3df9f/_ds_bundle.js"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0..1,0&amp;display=block">
</helmet>

<!-- Pre-load Home components for storyboard row and live device (hidden from rendering) -->
<div style="display: none">
  <x-import component="PromptCard" from="../_theme/components.jsx" hint-size="0,0"></x-import>
  <x-import component="BottomNav" from="../home/storyboards/nav-bar.jsx" hint-size="0,0"></x-import>
  <x-import component="HomeScreen" from="../home/storyboards/screens.jsx" hint-size="0,0"></x-import>
  <x-import component="Dialog" from="../_theme/components.jsx" hint-size="0,0"></x-import>
  <x-import component="EmptyState" from="../_theme/components.jsx" hint-size="0,0"></x-import>
</div>

<!-- ── Page header ── -->
<x-import component="BoardHeader" from="../_theme/board.jsx"
          title="Hijri — Month Grid &amp; Selection"
          subtitle="One board, one flow. The device on the right runs the interactive prototype; the board follows its state."
          hint-size="1440px,92px"></x-import>

<!-- ── Stage ── -->
<div class="poc-stage">

  <!-- Storyboard frames -->
  <div class="poc-frames">
    <x-import component="CalendarRow" from="./storyboards/calendar-row.jsx"
              active="{{ calendarActive }}"
              on-select-frame="{{ selectFrame }}"
              hint-size="760px,600px">
    </x-import>
  </div>

  <!-- Live interactive device -->
  <x-import component="BoardLive" from="../_theme/board.jsx"
            restart="{{ restart }}"
            hint="Click the Hijri tool on the Home Screen to open the Calendar."
            hint-size="400px,900px">
    <x-import component="IOSDevice" from="../ios-frame.jsx" hint-size="402px,874px">
      <div style="width:100%;height:100%;position:relative;overflow:hidden">
        
        <!-- ════ STAGE · HOME ════ -->
        <sc-if value="{{ isHomeStage }}">
          <div class="{{ stepAnim }}" style="position:absolute;inset:0;display:flex;flex-direction:column">
            <div style="flex:1;position:relative;overflow:hidden">
              <x-import component="HomeScreen" from="../home/storyboards/screens.jsx"
                        go-hijri="{{ goCalendarStage }}"
                        go-asma="{{ goAsma }}"
                        go-dua="{{ goDua }}"
                        hint-size="100%,100%">
              </x-import>
            </div>
            <x-import component="BottomNav" from="../home/storyboards/nav-bar.jsx"
                      active-index="0"
                      hint-size="100%,84px">
            </x-import>
          </div>
        </sc-if>

        <!-- ════ STAGE · CALENDAR ════ -->
        <sc-if value="{{ isCalendarStage }}">
          <div class="{{ stepAnim }}" style="position:absolute;inset:0">
            <x-import component="CalendarScreen" from="./storyboards/screens.jsx"
                      month-idx="{{ monthIdx }}"
                      selected-idx="{{ selectedIdx }}"
                      mode="{{ calendarMode }}"
                      on-select-day="{{ selectDay }}"
                      on-prev-month="{{ prevMonth }}"
                      on-next-month="{{ nextMonth }}"
                      on-back="{{ goHomeStage }}"
                      on-retry="{{ retryCalendar }}"
                      on-dismiss-error="{{ dismissCalendarError }}"
                      hint-size="100%,100%">
            </x-import>
          </div>
        </sc-if>

      </div>
    </x-import>
  </x-import>

</div>
</x-dc>

<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {
    stage: location.hash ? 'calendar' : 'home', // deep-link from Home Screen or a deterministic board state
    monthIdx: 1, // 0 = Dhul Hijjah, 1 = Muharram, 2 = Safar
    selectedIdx: 11, // Thu 9 Jun = 25 Muharram (today)
    calendarMode: location.hash === '#loading' ? 'loading' : location.hash === '#error' ? 'error' : location.hash === '#empty' ? 'empty' : 'loaded',
    stepDir: 'fwd'
  };

  selectDay = (idx) => {
    this.setState({ selectedIdx: idx });
  };

  selectFrame = (i) => {
    const frames = [
      { m: 1, s: 11, mode: 'loading' },
      { m: 1, s: 11, mode: 'loaded' },
      { m: 1, s: 17, mode: 'loaded' },
      { m: 2, s: -1, mode: 'loaded' },
      { m: 0, s: -1, mode: 'loaded' },
      { m: 2, s: -1, mode: 'empty' },
      { m: 1, s: 11, mode: 'error' }
    ];
    const target = frames[i];
    this.setState({
      stage: 'calendar',
      monthIdx: target.m,
      selectedIdx: target.s,
      calendarMode: target.mode,
      stepDir: this.state.stage === 'home' ? 'fwd' : 'none'
    });
  };

  prevMonth = () => {
    this.setState(s => ({ monthIdx: Math.max(0, s.monthIdx - 1), selectedIdx: -1, calendarMode: 'loaded' }));
  };

  nextMonth = () => {
    this.setState(s => ({ monthIdx: Math.min(2, s.monthIdx + 1), selectedIdx: -1, calendarMode: 'loaded' }));
  };

  goCalendarStage = () => {
    this.setState({ stage: 'calendar', calendarMode: 'loaded', stepDir: 'fwd' });
  };

  goHomeStage = () => {
    this.setState({ stage: 'home', stepDir: 'back' });
  };

  goAsma = () => {
    window.location.href = '../asma-ul-husna/Asma ul Husna.dc.html';
  };

  goDua = () => {
    window.location.href = '../dua-dikhr/Dua & Dikhr.dc.html#categories';
  };

  retryCalendar = () => {
    this.setState({ calendarMode: 'loaded' });
  };

  dismissCalendarError = () => {
    this.setState({ calendarMode: 'loaded' });
  };

  restart = () => {
    this.setState({ stage: 'home', monthIdx: 1, selectedIdx: 11, calendarMode: 'loaded', stepDir: 'back' });
  };

  renderVals() {
    const s = this.state;
    
    // Map selectedIdx and stage to storyboard frame index
    let calendarActive = -1;
    if (s.stage === 'calendar') {
      if (s.calendarMode === 'loading') calendarActive = 0;
      else if (s.calendarMode === 'error') calendarActive = 6;
      else if (s.calendarMode === 'empty') calendarActive = 5;
      else if (s.monthIdx === 1 && s.selectedIdx === 11) calendarActive = 1;
      else if (s.monthIdx === 1 && s.selectedIdx !== 11) calendarActive = 2;
      else if (s.monthIdx === 2) calendarActive = 3;
      else if (s.monthIdx === 0) calendarActive = 4;
    }

    return {
      monthIdx: s.monthIdx,
      selectedIdx: s.selectedIdx,
      calendarMode: s.calendarMode,
      calendarActive,
      isHomeStage: s.stage === 'home',
      isCalendarStage: s.stage === 'calendar',
      stepAnim: s.stepDir === 'fwd' ? 'step-fwd' : s.stepDir === 'back' ? 'step-back' : '',
      selectDay: this.selectDay,
      selectFrame: this.selectFrame,
      prevMonth: this.prevMonth,
      nextMonth: this.nextMonth,
      goCalendarStage: this.goCalendarStage,
      goHomeStage: this.goHomeStage,
      goAsma: this.goAsma,
      goDua: this.goDua,
      restart: this.restart,
      retryCalendar: this.retryCalendar,
      dismissCalendarError: this.dismissCalendarError
    };
  }
}
</script>
</body>
</html>
