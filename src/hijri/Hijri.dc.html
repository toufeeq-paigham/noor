<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="../support.js"></script>
<script src="../_theme/chrome.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="../_ds/noor-design-system-46f42e91-1858-412f-bdb6-560a6cc3df9f/colors_and_type.css">
  <link rel="stylesheet" href="../_theme/poc.css">
  <link rel="stylesheet" href="../_theme/components.css">
  <link rel="stylesheet" href="../_theme/icons.css">
  <script src="../_ds/noor-design-system-46f42e91-1858-412f-bdb6-560a6cc3df9f/_ds_bundle.js"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0..1,0&amp;display=block">
  <style>
    body{background:var(--canvas-bg);padding:36px 32px 90px;min-height:100vh;box-sizing:border-box}
    ::-webkit-scrollbar{display:none}*{-ms-overflow-style:none;scrollbar-width:none}
    
    /* Transition animations */
    @keyframes stepin { from{transform:translateX(28px);opacity:0} to{transform:translateX(0);opacity:1} }
    @keyframes stepback { from{transform:translateX(-28px);opacity:0} to{transform:translateX(0);opacity:1} }
    .step-fwd { animation:stepin .35s cubic-bezier(.2,.8,.2,1) }
    .step-back { animation:stepback .35s cubic-bezier(.2,.8,.2,1) }

    /* Calendar-specific layout classes (shared between live prototype and static frames) */
    .cal-card{background:color-mix(in oklab,var(--color-action-primary) 5%,var(--color-surface-primary));border:1px solid color-mix(in oklab,var(--color-action-primary) 25%,transparent);border-radius:20px;overflow:hidden}
    .cal-hdr{display:grid;grid-template-columns:repeat(7,1fr);padding:14px 4px 12px}
    .cal-hdr div{text-align:center;font-family:var(--font-body);font-size:12px;font-weight:700;color:var(--color-info-secondary)}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
    .cal-cell{text-align:center;padding:9px 2px;cursor:pointer;border-top:1px solid color-mix(in oklab,var(--color-action-primary) 12%,transparent);border-left:1px solid transparent;border-right:1px solid transparent;transition:background 160ms}
    .cal-cell.row0{border-top-color:transparent}
    .cal-g{font-family:var(--font-body);font-size:16px;font-weight:700;color:var(--color-info-primary);line-height:1.15}
    .cal-h{font-family:var(--font-body);font-size:11px;color:var(--color-info-secondary);line-height:1.25;margin-top:1px}
    .cal-cell.muted .cal-g{color:var(--color-info-faint);font-weight:600}
    .cal-cell.muted .cal-h{color:var(--color-info-faint);opacity:.65}
    .cal-cell.today{background:color-mix(in oklab,var(--color-action-primary) 14%,transparent);border-left-color:color-mix(in oklab,var(--color-action-primary) 40%,transparent);border-right-color:color-mix(in oklab,var(--color-action-primary) 40%,transparent)}
    .cal-cell.today .cal-g,.cal-cell.today .cal-h{color:var(--color-action-primary)}

    .evt-card{display:flex;align-items:center;gap:14px;background:color-mix(in oklab,var(--color-action-primary) 5%,var(--color-surface-primary));border:1px solid color-mix(in oklab,var(--color-action-primary) 22%,transparent);border-radius:16px;padding:15px 16px}
    .evt-num{width:44px;height:44px;border-radius:50%;background:var(--color-action-primary);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-body);font-size:15px;font-weight:800;color:#fff}
    .evt-title{font-family:var(--font-body);font-size:16px;font-weight:700;color:var(--color-info-primary)}
    .evt-sub{font-family:var(--font-body);font-size:13px;color:var(--color-info-secondary);margin-top:2px}
  </style>
</helmet>

<!-- Pre-load Home components for storyboard row and live device (hidden from rendering) -->
<div style="display: none">
  <x-import component="PromptCard" from="../_theme/components.jsx" hint-size="0,0"></x-import>
  <x-import component="BottomNav" from="../home/storyboards/nav-bar.jsx" hint-size="0,0"></x-import>
  <x-import component="HomeScreen" from="../home/storyboards/screens.jsx" hint-size="0,0"></x-import>
</div>

<!-- ── Page header ── -->
<x-import component="BoardHeader" from="../_theme/board.jsx"
          title="Hijri — Month Grid &amp; Selection"
          subtitle="One board, one flow. The device on the right runs the interactive prototype; the board follows its state."
          hint-size="1440px,92px"></x-import>

<!-- ── Stage ── -->
<div class="poc-stage">

  <!-- Storyboard frames -->
  <div class="poc-frames">
    <x-import component="CalendarRow" from="./storyboards/calendar-row.jsx"
              active="{{ calendarActive }}"
              on-select-frame="{{ selectFrame }}"
              hint-size="760px,600px">
    </x-import>
  </div>

  <!-- Live interactive device -->
  <x-import component="BoardLive" from="../_theme/board.jsx"
            restart="{{ restart }}"
            hint="Click the Hijri tool on the Home Screen to open the Calendar."
            hint-size="400px,900px">
    <x-import component="IOSDevice" from="../ios-frame.jsx" hint-size="402px,874px">
      <div style="width:100%;height:100%;position:relative;overflow:hidden">
        
        <!-- ════ STAGE · HOME ════ -->
        <sc-if value="{{ isHomeStage }}">
          <div class="{{ stepAnim }}" style="position:absolute;inset:0;display:flex;flex-direction:column">
            <div style="flex:1;position:relative;overflow:hidden">
              <x-import component="HomeScreen" from="../home/storyboards/screens.jsx"
                        go-hijri="{{ goCalendarStage }}"
                        go-asma="{{ goAsma }}"
                        go-dua="{{ goDua }}"
                        hint-size="100%,100%">
              </x-import>
            </div>
            <x-import component="BottomNav" from="../home/storyboards/nav-bar.jsx"
                      active-index="0"
                      hint-size="100%,84px">
            </x-import>
          </div>
        </sc-if>

        <!-- ════ STAGE · CALENDAR ════ -->
        <sc-if value="{{ isCalendarStage }}">
          <div class="{{ stepAnim }}" style="position:absolute;inset:0">
            <x-import component="CalendarScreen" from="./storyboards/screens.jsx"
                      month-idx="{{ monthIdx }}"
                      selected-idx="{{ selectedIdx }}"
                      on-select-day="{{ selectDay }}"
                      on-prev-month="{{ prevMonth }}"
                      on-next-month="{{ nextMonth }}"
                      on-back="{{ goHomeStage }}"
                      hint-size="100%,100%">
            </x-import>
          </div>
        </sc-if>

      </div>
    </x-import>
  </x-import>

</div>
</x-dc>

<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {
    stage: location.hash === '#calendar' ? 'calendar' : 'home', // deep-link from Home Screen
    monthIdx: 1, // 0 = Dhul Hijjah, 1 = Muharram, 2 = Safar
    selectedIdx: 11, // Thu 9 Jun = 25 Muharram (today)
    stepDir: 'fwd'
  };

  selectDay = (idx) => {
    this.setState({ selectedIdx: idx });
  };

  selectFrame = (i) => {
    if (i === 0) {
      this.setState({ stage: 'home', stepDir: 'back' });
    } else {
      const frames = [
        null,
        { m: 1, s: 11 }, // Muharram, Today selected
        { m: 2, s: -1 }, // Safar
        { m: 0, s: -1 }  // Dhul Hijjah
      ];
      const target = frames[i];
      this.setState({
        stage: 'calendar',
        monthIdx: target.m,
        selectedIdx: target.s,
        stepDir: this.state.stage === 'home' ? 'fwd' : 'none'
      });
    }
  };

  prevMonth = () => {
    this.setState(s => ({ monthIdx: Math.max(0, s.monthIdx - 1) }));
  };

  nextMonth = () => {
    this.setState(s => ({ monthIdx: Math.min(2, s.monthIdx + 1) }));
  };

  goCalendarStage = () => {
    this.setState({ stage: 'calendar', stepDir: 'fwd' });
  };

  goHomeStage = () => {
    this.setState({ stage: 'home', stepDir: 'back' });
  };

  goAsma = () => {
    window.location.href = '../asma-ul-husna/Asma ul Husna.dc.html';
  };

  goDua = () => {
    window.location.href = '../dua-dikhr/Dua & Dikhr.dc.html#categories';
  };

  restart = () => {
    this.setState({ stage: 'home', monthIdx: 1, selectedIdx: 11, stepDir: 'back' });
  };

  renderVals() {
    const s = this.state;
    
    // Map selectedIdx and stage to storyboard frame index
    let calendarActive = -1;
    if (s.stage === 'home') {
      calendarActive = 0;
    } else if (s.stage === 'calendar') {
      if (s.monthIdx === 1 && s.selectedIdx === 11) {
        calendarActive = 1;
      } else if (s.monthIdx === 2) {
        calendarActive = 2;
      } else if (s.monthIdx === 0) {
        calendarActive = 3;
      }
    }

    return {
      monthIdx: s.monthIdx,
      selectedIdx: s.selectedIdx,
      calendarActive,
      isHomeStage: s.stage === 'home',
      isCalendarStage: s.stage === 'calendar',
      stepAnim: s.stepDir === 'fwd' ? 'step-fwd' : s.stepDir === 'back' ? 'step-back' : '',
      selectDay: this.selectDay,
      selectFrame: this.selectFrame,
      prevMonth: this.prevMonth,
      nextMonth: this.nextMonth,
      goCalendarStage: this.goCalendarStage,
      goHomeStage: this.goHomeStage,
      goAsma: this.goAsma,
      goDua: this.goDua,
      restart: this.restart
    };
  }
}
</script>
</body>
</html>
