<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="../support.js"></script>
<script src="../_theme/chrome.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="../_ds/noor-design-system-46f42e91-1858-412f-bdb6-560a6cc3df9f/colors_and_type.css">
  <link rel="stylesheet" href="../_theme/poc.css">
  <link rel="stylesheet" href="../_theme/components.css">
  <script src="../_ds/noor-design-system-46f42e91-1858-412f-bdb6-560a6cc3df9f/_ds_bundle.js"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0..1,0&amp;display=block">
  <link rel="stylesheet" href="../_theme/icons.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@700&amp;display=swap">
  <style>
    body{background:var(--canvas-bg);padding:36px 32px 90px;min-height:100vh;box-sizing:border-box}
    ::-webkit-scrollbar{display:none}*{-ms-overflow-style:none;scrollbar-width:none}
    
    /* Profile Gradient Hero */
    .p-hero{background:radial-gradient(ellipse at top right, color-mix(in oklab, var(--color-action-primary) 20%, transparent) 0%, transparent 60%),radial-gradient(ellipse at top left, color-mix(in oklab, var(--color-action-secondary) 12%, transparent) 0%, transparent 55%),var(--color-surface-primary)}
    [data-theme="dark"] .p-hero{background:radial-gradient(ellipse at top right, rgba(0,80,50,0.6) 0%, rgba(9,9,11,0) 60%),radial-gradient(ellipse at top left, rgba(0,40,30,0.4) 0%, rgba(9,9,11,0) 55%),var(--color-surface-primary)}
    
    .prow{cursor:pointer;transition:background .15s ease}
    .prow:active{background:color-mix(in oklab, var(--color-info-primary) 8%, transparent)}
    .pbtn{cursor:pointer;transition:filter .15s ease}
    .pbtn:active{filter:brightness(0.9)}

    @view-transition{navigation:auto}
    ::view-transition-group(masjid-admin-masjid-e-bilal-title){animation-duration:var(--motion-emphasized);animation-timing-function:var(--ease-out)}

    /* Qaum media is one image surface in two compositions. Component geometry lives here;
       colors, radii, control targets, spacing, and motion remain Noor tokens. */
    .qaum-post-media{display:block;width:100%;aspect-ratio:3/2;margin:0 0 var(--size-lg);padding:0;overflow:hidden;box-sizing:border-box;border:0;border-radius:var(--radius-2xl);background:var(--color-surface-secondary);cursor:pointer}
    .qaum-post-media img{display:block;width:100%;height:100%;object-fit:cover}
    .qaum-post-media.expanded{height:100%;aspect-ratio:auto;margin:0;cursor:default;background:var(--color-surface-primary)}
    .qaum-post-media.expanded img{object-fit:contain}
    .qaum-media-overlay{position:absolute;inset:0;z-index:500;display:flex;box-sizing:border-box;padding:calc(var(--size-max) + var(--size-2xl)) var(--size-xl) var(--size-2xl);background:var(--color-surface-scrim);animation:qaum-media-fade var(--motion-standard) var(--ease-out)}
    .qaum-media-viewer{position:relative;display:flex;flex:1;min-width:0;min-height:0;box-sizing:border-box;padding-top:calc(var(--control-h-lg) + var(--size-xl))}
    .qaum-media-close{position:absolute;top:0;right:0;z-index:1;width:var(--control-h-lg);height:var(--control-h-lg);display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--color-neutral-border);border-radius:var(--radius-circle);padding:0;background:var(--color-action-background);color:var(--color-info-primary);cursor:pointer;transition:background var(--motion-quick) var(--ease-out)}
    .qaum-media-close .mi{font-size:var(--icon-md)}
    .qaum-media-close:active{background:var(--color-action-primary-tint)}
    @keyframes qaum-media-fade{from{opacity:0}to{opacity:1}}
    ::view-transition-group(qaum-post-post1-media-0){animation-duration:var(--motion-emphasized);animation-timing-function:var(--ease-out)}
    @media (prefers-reduced-motion:reduce){.qaum-media-overlay{animation:none}::view-transition-group(qaum-post-post1-media-0),::view-transition-group(masjid-admin-masjid-e-bilal-title){animation-duration:0ms}}
  </style>
</helmet>

<!-- Reusable components layer -->
<x-import component="PromptCard" from="../_theme/components.jsx" hint-size="0,0"></x-import>

<!-- ── Board header (shared board chrome) ── -->
<x-import component="BoardHeader" from="../_theme/board.jsx"
          title="Home — Tabs &amp; Variations"
          subtitle="Explore all primary app tabs (Home, Qaum, Quran, Salaah, Profile) and hero details variations inside the interactive mockup."
          hint-size="1440px,92px"></x-import>

<!-- ── Board Scaffold ── -->
<div class="poc-stage">

  <!-- Static Storyboard rows (separated by tab/row) -->
  <div class="poc-frames">
    <x-import component="HomePrayerRow" from="./storyboards/tabs-row.jsx"
              active="{{ activeFrameIndex }}"
              on-select-frame="{{ syncLiveStateToFrame }}"
              hint-size="1200px,580px">
    </x-import>
    <x-import component="HomeRow" from="./storyboards/tabs-row.jsx"
              active="{{ activeFrameIndex }}"
              on-select-frame="{{ syncLiveStateToFrame }}"
              hint-size="1000px,580px">
    </x-import>
    <x-import component="QaumRow" from="./storyboards/tabs-row.jsx"
              active="{{ activeFrameIndex }}"
              on-select-frame="{{ syncLiveStateToFrame }}"
              hint-size="300px,580px">
    </x-import>
    <x-import component="QuranRow" from="./storyboards/tabs-row.jsx"
              active="{{ activeFrameIndex }}"
              on-select-frame="{{ syncLiveStateToFrame }}"
              hint-size="300px,580px">
    </x-import>
    <x-import component="SalaahRow" from="./storyboards/tabs-row.jsx"
              active="{{ activeFrameIndex }}"
              on-select-frame="{{ syncLiveStateToFrame }}"
              hint-size="300px,580px">
    </x-import>
    <x-import component="ProfileRow" from="./storyboards/tabs-row.jsx"
              active="{{ activeFrameIndex }}"
              on-select-frame="{{ syncLiveStateToFrame }}"
              hint-size="300px,580px">
    </x-import>
  </div>

  <!-- Live interactive device -->
  <x-import component="BoardLive" from="../_theme/board.jsx" restart="{{ resetToDefault }}" hint-size="400px,900px">
    <x-import component="IOSDevice" from="../ios-frame.jsx" hint-size="402px,874px">
      <div class="noor-screen" style="display:flex;flex-direction:column;height:100%;position:relative;overflow:hidden">
        <div class="noor-island"></div>

        <!-- Screen Slot -->
        <div style="position:absolute;inset:0;z-index:1">
          
          <!-- TAB 0: HOME SCREEN -->
          <sc-if value="{{ isHomeTab }}">
            <x-import component="HomeScreen" from="./storyboards/screens.jsx"
                      hero-sel="{{ homeHeroSel }}"
                      on-suhoor-tap="{{ toggleSuhoor }}"
                      on-iftaar-tap="{{ toggleIftaar }}"
                      prayers="{{ homePrayers }}"
                      on-toggle-prayer="{{ toggleHomePrayer }}"
                      salaah-count="{{ homeSalaahCount }}"
                      sehri-note-visible="{{ homeSehriNote }}"
                      on-sehri-tap="{{ triggerSehriNote }}"
                      slide="{{ homeSlide }}"
                      on-slide-dot-tap="{{ changeSlide }}"
                      likes="{{ homeLikes }}"
                      on-haj-like="{{ toggleHajLike }}"
                      on-eid-like="{{ toggleEidLike }}"
                      on-bell-tap="{{ toggleNotif }}"
                      notif-on="{{ homeNotifOn }}"
                      go-quran="{{ switchToTab2 }}"
                      go-dua="{{ goDua }}"
                      go-sehri="{{ goSehri }}"
                      go-masjids="{{ goMasjids }}"
                      go-hijri="{{ goHijri }}"
                      go-asma="{{ goAsma }}"
                      go-zakaat="{{ goZakaat }}"
                      go-qibla="{{ goQibla }}"
                      prayer="{{ homeActivePrayer }}"
                      user-name="{{ homeUserName }}"
                      masjid-name="{{ homeMasjidLabel }}"
                      on-masjid-tap="{{ goMyMasjids }}"
                      login-nudge="{{ homeLoginNudge }}"
                      on-close-login-nudge="{{ closeLoginNudge }}"
                      on-sign-in-tap="{{ triggerSignIn }}"
                      follow-nudge="{{ homeFollowNudge }}"
                      on-close-follow-nudge="{{ closeHomeFollowNudge }}"
                      on-find-masjid="{{ goMasjids }}"
                      notif-nudge="{{ homeNotifNudge }}"
                      on-close-notif-nudge="{{ closeHomeNotifNudge }}"
                      on-allow-notif="{{ allowNotif }}"
                      tracking-loading="{{ homeTrackingLoading }}"
                      hint-size="100%,100%">
            </x-import>
          </sc-if>

          <!-- TAB 1: QAUM SCREEN -->
          <sc-if value="{{ isQaumTab }}">
            <x-import component="QaumScreen" from="./storyboards/screens.jsx"
                      likes="{{ qaumLikes }}"
                      on-like="{{ toggleQaumLike }}"
                      audio-playing="{{ qaumAudioPlaying }}"
                      audio-progress="{{ qaumAudioProgress }}"
                      on-toggle-audio="{{ toggleQaumAudio }}"
                      dock="{{ qaumDock }}"
                      on-close-audio="{{ closeQaumAudio }}"
                      login-nudge="{{ qaumLoginNudge }}"
                      on-close-login-nudge="{{ closeQaumNudge }}"
                      on-sign-in-tap="{{ triggerSignIn }}"
                      follow-nudge="{{ qaumFollowNudge }}"
                      on-close-follow-nudge="{{ closeQaumNudge }}"
                      on-find-masjid="{{ goMasjids }}"
                      notif-nudge="{{ qaumNotifNudge }}"
                      on-close-notif-nudge="{{ closeQaumNudge }}"
                      on-allow-notif="{{ allowNotif }}"
                      content-state="{{ qaumContentState }}"
                      on-retry="{{ retryQaum }}"
                      media-open="{{ qaumMediaOpen }}"
                      media-transition-enabled="{{ qaumMediaTransitionEnabled }}"
                      on-open-media="{{ openQaumMedia }}"
                      on-close-media="{{ closeQaumMedia }}"
                      hint-size="100%,100%">
            </x-import>
          </sc-if>

          <!-- TAB 2: QURAN SCREEN -->
          <sc-if value="{{ isQuranTab }}">
            <x-import component="QuranScreen" from="./storyboards/screens.jsx"
                      active-tab="{{ quranTab }}"
                      on-select-tab="{{ setQuranTab }}"
                      on-select-surah="{{ goReaderSurah }}"
                      on-select-juz="{{ goReaderJuz }}"
                      content-state="{{ quranContentState }}"
                      on-retry="{{ retryQuran }}"
                      hint-size="100%,100%">
            </x-import>
          </sc-if>

          <!-- TAB 3: SALAAH SCREEN -->
          <sc-if value="{{ isSalaahTab }}">
            <x-import component="SalaahScreen" from="./storyboards/screens.jsx"
                      masjid-letter="{{ salaahMasjidLetter }}"
                      masjid-name="{{ salaahMasjidName }}"
                      masjid-sub="{{ salaahMasjidSub }}"
                      on-masjid-sheet-toggle="{{ goMyMasjids }}"
                      show-masjid-sheet="{{ salaahShowMasjidSheet }}"
                      on-select-masjid="{{ selectSalaahMasjid }}"
                      prayers-alert="{{ salaahPrayersAlert }}"
                      prayers-checked="{{ salaahPrayersChecked }}"
                      on-toggle-check="{{ toggleSalaahCheck }}"
                      on-toggle-alert="{{ toggleSalaahAlert }}"
                      guest="{{ homeGuest }}"
                      login-nudge="{{ salaahLoginNudge }}"
                      on-close-login-nudge="{{ closeSalaahNudge }}"
                      on-sign-in-tap="{{ triggerSignIn }}"
                      login-sheet="{{ salaahLoginSheet }}"
                      on-open-login-sheet="{{ openSalaahLoginSheet }}"
                      on-close-login-sheet="{{ closeSalaahLoginSheet }}"
                      no-masjid="{{ homeNoMasjid }}"
                      follow-nudge="{{ salaahFollowNudge }}"
                      on-close-follow-nudge="{{ closeSalaahNudge }}"
                      on-find-masjid="{{ goMasjids }}"
                      notif-nudge="{{ salaahNotifNudge }}"
                      on-close-notif-nudge="{{ closeSalaahNudge }}"
                      on-allow-notif="{{ allowNotif }}"
                      hint-size="100%,100%">
            </x-import>
          </sc-if>

          <!-- TAB 4: PROFILE SCREEN -->
          <sc-if value="{{ isProfileTab }}">
            <x-import component="ProfileScreen" from="./storyboards/screens.jsx"
                      user-name="{{ profileUserName }}"
                      phone="{{ profilePhone }}"
                      show-my-masjids="{{ profileHasMasjid }}"
                      show-managed-masjid="{{ profileManagedMasjid }}"
                      masjid-name="{{ homeMasjidLabel }}"
                      on-my-masjids="{{ goMyMasjids }}"
                      on-manage-masjid="{{ goMasjidAdmin }}"
                      admin-transition-enabled="true"
                      logout-open="{{ profileLogoutOpen }}"
                      on-toggle-logout-sheet="{{ toggleProfileLogoutSheet }}"
                      on-confirm-logout="{{ resetToDefault }}"
                      on-register="{{ noop }}"
                      on-invite="{{ noop }}"
                      on-approve="{{ noop }}"
                      on-terms="{{ noop }}"
                      on-privacy="{{ noop }}"
                      on-about="{{ noop }}"
                      hint-size="100%,100%">
            </x-import>
          </sc-if>
          
        </div>

        <!-- BOTTOM TAB BAR (shared component — same one the storyboard frames use) -->
        <sc-if value="{{ showBottomNav }}">
          <x-import component="BottomNav" from="./storyboards/nav-bar.jsx"
                    active-index="{{ activeTab }}"
                    on-select="{{ onNavSelect }}"
                    hint-size="100%,84px">
          </x-import>
        </sc-if>

        <!-- Guest profile LoginSheet (HomeViewModel.kt) — guest taps the Profile tab.
             Device-level so it overlays whichever tab is showing, nav bar included. -->
        <x-import component="Dialog" from="../_theme/components.jsx"
                  mode="sheet"
                  is-open="{{ homeGuestSheet }}"
                  on-close="{{ closeGuestSheet }}"
                  title="Your profile is waiting for you"
                  description="Sign in with your phone number to save your preferences, follow masjids you care about, and pick up where you left off."
                  primary="{{ guestSheetPrimary }}"
                  secondary="{{ guestSheetSecondary }}"
                  hint-size="0,0">
        </x-import>

        <!-- Rich follow-masjid sheet (NudgeSheetFactory.kt FirstTimeFollowMasjid) — signed in,
             no primary masjid, once per cold start. Device-level so it covers the nav bar. -->
        <x-import component="MasjidNudgeSheet" from="./storyboards/screens.jsx"
                  is-open="{{ masjidSheetOpen }}"
                  on-close="{{ closeMasjidSheet }}"
                  on-find-masjid="{{ goMasjids }}"
                  hint-size="0,0">
        </x-import>

        <!-- Rich notification sheet (NotificationPermissionSheetContent.kt) — signed in with
             masjid, notifs off, 2nd qualifying Home/Salaah visit. Device-level. -->
        <x-import component="NotificationNudgeSheet" from="./storyboards/screens.jsx"
                  is-open="{{ notifSheetOpen }}"
                  on-close="{{ closeNotifSheet }}"
                  on-allow="{{ allowNotif }}"
                  hint-size="0,0">
        </x-import>

        <!-- Guest sign-in interrupt sheet (NudgeSheetFactory.kt GuestSignIn) — guest on Qaum/Salaah. -->
        <x-import component="Dialog" from="../_theme/components.jsx"
                  mode="sheet"
                  is-open="{{ guestSignInSheetOpen }}"
                  on-close="{{ closeGuestSignInSheet }}"
                  title="Sign in to Paigham"
                  description="Save your masjid, get iqama times, and sync reminders across your devices."
                  primary="{{ guestSignInPrimary }}"
                  secondary="{{ guestSignInSecondary }}"
                  hint-size="0,0">
        </x-import>

        <!-- Privacy / ATT pre-prompt sheet + system ATT dialog — device-level (fixed, don't scroll
             with the Home content). Continue → ATT dialog; a choice dismisses back to Home. -->
        <x-import component="PrivacyNudgeSheet" from="./storyboards/screens.jsx"
                  is-open="{{ homePrivacyConsent }}"
                  on-close="{{ closePrivacyConsent }}"
                  on-continue="{{ triggerAttPrompt }}"
                  hint-size="0,0">
        </x-import>
        <x-import component="AttDialog" from="./storyboards/screens.jsx"
                  is-open="{{ homeAttPrompt }}"
                  on-choice="{{ dismissAttPrompt }}"
                  hint-size="0,0">
        </x-import>

        <div class="noor-home"></div>
      </div>
    </x-import>
  </x-import>

</div>
</x-dc>

<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {
    activeTab: 0,
    activeFrameIndex: 0,
    
    // Home tab state
    homeHeroSel: null,
    homeActivePrayer: 'Maghrib',
    homeGuest: false,
    homeLoginNudge: false,
    homePrivacyConsent: false,
    homeAttPrompt: false,
    homeGuestSheet: false,       // "Your profile is waiting for you" LoginSheet (guest taps Profile tab)
    qaumNudgeClosed: false,      // dismissed the Qaum inline nudge this session (guest or no-masjid)
    salaahNudgeClosed: false,    // dismissed the Salaah inline nudge this session (guest or no-masjid)
    salaahLoginSheet: false,     // Salaah "Sign in to continue" LoginSheet (guest auth-gated taps)
    homeNoMasjid: false,         // signed in without a primary masjid (follow-masjid nudges)
    homeFollowNudge: false,      // Home inline follow-masjid nudge visible
    masjidSheetOpen: false,      // rich "Pick your masjid, stay in sync" sheet
    homeNotifOff: false,         // signed in with masjid but notifications off (notif nudges)
    homeNotifNudge: false,       // Home inline "Enable Notifications" nudge visible
    notifSheetOpen: false,       // rich "Stay in the loop" sheet
    guestSignInSheetOpen: false, // guest "Sign in to Paigham" interrupt sheet (Qaum/Salaah)
    homePrayers: { Fajr: true, Zohar: true, Asr: true, Maghrib: true, Isha: false },
    homeSehriNote: false,
    homeSlide: 0,
    homeLikes: { haj: { liked: true, count: 4 }, eid: { liked: true, count: 12 } },
    homeNotifOn: true,
    homeTrackingLoading: false,
    
    // Qaum tab state
    qaumLikes: { post1: { liked: true, count: 4 }, post2: { liked: false, count: 2 }, post3: { liked: true, count: 8 } },
    qaumAudioPlaying: false,
    qaumAudioProgress: 0,
    qaumDock: 'none',
    qaumContentState: 'ready',
    qaumMediaOpen: false,

    // Quran tab state
    quranTab: 0,
    quranContentState: 'ready',

    // Salaah tab state
    salaahShowMasjidSheet: false,
    salaahMasjidLetter: "B",
    salaahMasjidName: "Masjid E Bilal",
    salaahMasjidSub: "Bannerghatta Road, Bengaluru",
    salaahPrayersAlert: { Fajr: false, Zohar: true, Asr: false, Maghrib: true, Isha: false },
    salaahPrayersChecked: { Fajr: true, Zohar: true, Asr: true, Maghrib: false, Isha: false },

    // Profile tab state
    profileLogoutOpen: false,
    profileUserName: "Toufeeq",
    profilePhone: "+91 87928 13003",
    profileHasMasjid: true,
    profileManagedMasjid: false
  };

  componentDidMount() {
    const hash = window.location.hash;
    if (hash) {
      if (hash === '#home') this.syncLiveStateToFrame(0);
      else if (hash === '#home-login-nudge') this.syncLiveStateToFrame(1);
      else if (hash === '#home-privacy-consent') this.syncLiveStateToFrame(2);
      else if (hash === '#home-att-prompt') this.syncLiveStateToFrame(3);
      else if (hash === '#qaum') this.syncLiveStateToFrame(4);
      else if (hash === '#quran') this.syncLiveStateToFrame(5);
      else if (hash === '#salaah') this.syncLiveStateToFrame(6);
      else if (hash === '#profile') this.syncLiveStateToFrame(7);
      else if (hash === '#qaum-guest') this.syncLiveStateToFrame(17);
      else if (hash === '#salaah-guest') this.syncLiveStateToFrame(18);
      else if (hash === '#home-guest-sheet') this.syncLiveStateToFrame(19);
      else if (hash === '#home-no-masjid') this.syncLiveStateToFrame(20);
      else if (hash === '#qaum-no-masjid') this.syncLiveStateToFrame(21);
      else if (hash === '#qaum-masjid-sheet') this.syncLiveStateToFrame(22);
      else if (hash === '#salaah-no-masjid') this.syncLiveStateToFrame(23);
      else if (hash === '#home-notif') this.syncLiveStateToFrame(24);
      else if (hash === '#qaum-notif') this.syncLiveStateToFrame(25);
      else if (hash === '#salaah-notif') this.syncLiveStateToFrame(26);
      else if (hash === '#salaah-notif-sheet') this.syncLiveStateToFrame(27);
      else if (hash === '#salaah-masjid-sheet') this.syncLiveStateToFrame(28);
      else if (hash === '#qaum-guest-signin-sheet') this.syncLiveStateToFrame(29);
      else if (hash === '#qaum-notif-sheet') this.syncLiveStateToFrame(30);
      else if (hash === '#qaum-loading') this.syncLiveStateToFrame(31);
      else if (hash === '#qaum-empty') this.syncLiveStateToFrame(32);
      else if (hash === '#qaum-error') this.syncLiveStateToFrame(33);
      else if (hash === '#quran-loading') this.syncLiveStateToFrame(34);
      else if (hash === '#quran-empty') this.syncLiveStateToFrame(35);
      else if (hash === '#quran-error') this.syncLiveStateToFrame(36);
      else if (hash === '#home-tracking-loading') this.syncLiveStateToFrame(37);
      else if (hash === '#profile-pending') this.syncLiveStateToFrame(38);
      else if (hash === '#qaum-media') this.syncLiveStateToFrame(39);
      else if (hash === '#profile-admin') this.syncLiveStateToFrame(40);
    }
  }

  // Sync Live Device state when static frame clicked on canvas
  syncLiveStateToFrame = (idx) => {
    const states = [
      { activeTab: 0, homeHeroSel: null, homeActivePrayer: 'Maghrib', homeGuest: false, homeLoginNudge: false, homePrivacyConsent: false, homeAttPrompt: false },
      { activeTab: 0, homeHeroSel: null, homeActivePrayer: 'Asr', homeGuest: true, homeLoginNudge: true, homePrivacyConsent: false, homeAttPrompt: false },
      { activeTab: 0, homeHeroSel: null, homeActivePrayer: 'Asr', homeGuest: true, homeLoginNudge: false, homePrivacyConsent: true, homeAttPrompt: false },
      { activeTab: 0, homeHeroSel: null, homeActivePrayer: 'Asr', homeGuest: true, homeLoginNudge: true, homePrivacyConsent: false, homeAttPrompt: true },
      { activeTab: 1, qaumAudioPlaying: false, qaumAudioProgress: 0, qaumDock: 'none' },
      { activeTab: 2 },
      { activeTab: 3 },
      { activeTab: 4 },
      { activeTab: 0, homeHeroSel: null, homeActivePrayer: 'Fajr', homeGuest: false, homeLoginNudge: false, homePrivacyConsent: false, homeAttPrompt: false },
      { activeTab: 0, homeHeroSel: null, homeActivePrayer: 'Zohar', homeGuest: false, homeLoginNudge: false, homePrivacyConsent: false, homeAttPrompt: false },
      { activeTab: 0, homeHeroSel: null, homeActivePrayer: 'Asr', homeGuest: false, homeLoginNudge: false, homePrivacyConsent: false, homeAttPrompt: false },
      { activeTab: 0, homeHeroSel: null, homeActivePrayer: 'Maghrib', homeGuest: false, homeLoginNudge: false, homePrivacyConsent: false, homeAttPrompt: false },
      { activeTab: 0, homeHeroSel: null, homeActivePrayer: 'Isha', homeGuest: false, homeLoginNudge: false, homePrivacyConsent: false, homeAttPrompt: false },
      // 13-15 · Qaum audio-player variations
      { activeTab: 1, qaumAudioPlaying: true, qaumAudioProgress: 1, qaumDock: 'none' },
      { activeTab: 1, qaumAudioPlaying: true, qaumAudioProgress: 5, qaumDock: 'top' },
      { activeTab: 1, qaumAudioPlaying: true, qaumAudioProgress: 9, qaumDock: 'bottom' },
      // 16 · Quran Juz view
      { activeTab: 2, quranTab: 1 },
      // 17-19 · Guest sign-in states (Qaum nudge · Salaah approx timings · Profile LoginSheet)
      { activeTab: 1, homeGuest: true, qaumAudioPlaying: false, qaumAudioProgress: 0, qaumDock: 'none' },
      { activeTab: 3, homeGuest: true },
      { activeTab: 0, homeGuest: true, homeHeroSel: null, homeActivePrayer: 'Asr', homeLoginNudge: true, homeGuestSheet: true },
      // 20-23 · Signed in, no primary masjid (follow-masjid nudges + rich sheet)
      { activeTab: 0, homeNoMasjid: true, homeHeroSel: null, homeActivePrayer: 'Asr', homeFollowNudge: true },
      { activeTab: 1, homeNoMasjid: true, qaumAudioPlaying: false, qaumAudioProgress: 0, qaumDock: 'none' },
      { activeTab: 1, homeNoMasjid: true, masjidSheetOpen: true, qaumAudioPlaying: false, qaumAudioProgress: 0, qaumDock: 'none' },
      { activeTab: 3, homeNoMasjid: true, salaahPrayersChecked: { Fajr: false, Zohar: false, Asr: false, Maghrib: false, Isha: false } },
      // 24-27 · Signed in with masjid, notifications off (Enable Notifications nudges + rich sheet)
      { activeTab: 0, homeNotifOff: true, homeHeroSel: null, homeActivePrayer: 'Asr', homeNotifNudge: true },
      { activeTab: 1, homeNotifOff: true, qaumAudioPlaying: false, qaumAudioProgress: 0, qaumDock: 'none' },
      { activeTab: 3, homeNotifOff: true },
      { activeTab: 3, homeNotifOff: true, notifSheetOpen: true },
      // 28 · No-masjid rich sheet on Salaah · 29 · Guest sign-in interrupt sheet on Qaum
      { activeTab: 3, homeNoMasjid: true, masjidSheetOpen: true, salaahPrayersChecked: { Fajr: false, Zohar: false, Asr: false, Maghrib: false, Isha: false } },
      { activeTab: 1, homeGuest: true, guestSignInSheetOpen: true, qaumAudioPlaying: false, qaumAudioProgress: 0, qaumDock: 'none' },
      // 30 · Notification "Stay in the loop" sheet on Qaum
      { activeTab: 1, homeNotifOff: true, notifSheetOpen: true, qaumAudioPlaying: false, qaumAudioProgress: 0, qaumDock: 'none' },
      // 31-33 · Qaum loading, empty, and recoverable error
      { activeTab: 1, qaumContentState: 'loading', qaumAudioPlaying: false, qaumAudioProgress: 0, qaumDock: 'none' },
      { activeTab: 1, qaumContentState: 'empty', qaumAudioPlaying: false, qaumAudioProgress: 0, qaumDock: 'none' },
      { activeTab: 1, qaumContentState: 'error', qaumAudioPlaying: false, qaumAudioProgress: 0, qaumDock: 'none' },
      // 34-36 · Quran loading, empty, and recoverable error
      { activeTab: 2, quranContentState: 'loading' },
      { activeTab: 2, quranContentState: 'empty' },
      { activeTab: 2, quranContentState: 'error' },
      // 37 · Home timing content ready while Salaah tracking is loading
      { activeTab: 0, homeNoMasjid: true, homeFollowNudge: true, homeTrackingLoading: true, homeHeroSel: null, homeActivePrayer: 'Asr' },
      // 38 · Signed-in pending setup: never label this account as Guest
      { activeTab: 4, homeNoMasjid: true, profileUserName: 'Paigham User', profilePhone: '+91 81234 03269', profileHasMasjid: false },
      // 39 · Qaum media detail retains the feed behind a semantic overlay
      { activeTab: 1, qaumMediaOpen: true, qaumAudioPlaying: false, qaumAudioProgress: 0, qaumDock: 'none' },
      // 40 · Active committee membership opens the matching admin console
      { activeTab: 4, profileHasMasjid: true, profileManagedMasjid: true }
    ];
    clearInterval(this._audioTimer);
    this.setState({
      // Baseline: leaving a guest/no-masjid frame returns to signed-in-with-masjid
      // unless the frame re-asserts its mode.
      homeGuest: false,
      homeGuestSheet: false,
      homeNoMasjid: false,
      homeFollowNudge: false,
      masjidSheetOpen: false,
      homeNotifOff: false,
      homeNotifNudge: false,
      notifSheetOpen: false,
      guestSignInSheetOpen: false,
      qaumNudgeClosed: false,
      qaumContentState: 'ready',
      qaumMediaOpen: false,
      quranContentState: 'ready',
      homeTrackingLoading: false,
      profileUserName: 'Toufeeq',
      profilePhone: '+91 87928 13003',
      profileHasMasjid: true,
      profileManagedMasjid: false,
      salaahNudgeClosed: false,
      salaahLoginSheet: false,
      ...states[idx],
      activeFrameIndex: idx
    });
  };

  // Sync canvas active highlight ring based on current live state
  syncFrameIndexFromTab(tabIndex, s) {
    if (tabIndex === 0) {
      if (s.homeAttPrompt) return 3;
      if (s.homePrivacyConsent) return 2;
      if (s.homeGuestSheet) return 19;
      if (s.homeLoginNudge) return 1;
      if (s.homeTrackingLoading) return 37;
      if (s.homeFollowNudge) return 20;
      if (s.homeNotifNudge) return 24;
      const p = (s.homeActivePrayer || 'Maghrib').toLowerCase();
      if (p === 'fajr') return 8;
      if (p === 'zohar') return 9;
      if (p === 'asr') return 10;
      if (p === 'isha') return 12;
      return 0;
    }
    if (tabIndex === 1 && s.homeGuest) return s.guestSignInSheetOpen ? 29 : 17;
    if (tabIndex === 1 && s.homeNoMasjid) return s.masjidSheetOpen ? 22 : 21;
    if (tabIndex === 1 && s.homeNotifOff) return s.notifSheetOpen ? 30 : 25;
    if (tabIndex === 1 && s.qaumContentState === 'loading') return 31;
    if (tabIndex === 1 && s.qaumContentState === 'empty') return 32;
    if (tabIndex === 1 && s.qaumContentState === 'error') return 33;
    if (tabIndex === 1 && s.qaumMediaOpen) return 39;
    if (tabIndex === 2 && s.quranContentState === 'loading') return 34;
    if (tabIndex === 2 && s.quranContentState === 'empty') return 35;
    if (tabIndex === 2 && s.quranContentState === 'error') return 36;
    if (tabIndex === 3 && s.homeGuest) return 18;
    if (tabIndex === 3 && s.homeNoMasjid) return s.masjidSheetOpen ? 28 : 23;
    if (tabIndex === 3 && s.homeNotifOff) return s.notifSheetOpen ? 27 : 26;
    if (tabIndex === 4 && !s.profileHasMasjid) return 38;
    if (tabIndex === 4 && s.profileManagedMasjid) return 40;
    return tabIndex + 3;
  }

  // Switch tab handlers
  setTab = (idx) => () => {
    this.setState(s => {
      const next = { ...s, activeTab: idx, qaumMediaOpen: false };
      return {
        activeTab: idx,
        qaumMediaOpen: false,
        activeFrameIndex: this.syncFrameIndexFromTab(idx, next)
      };
    });
  };

  switchToTab2 = () => this.setTab(2)();
  switchToTab3 = () => this.setTab(3)();

  // BottomNav onSelect — guest tapping Profile gets the LoginSheet (HomeViewModel.kt); no tab switch.
  onNavSelect = (idx) => {
    if (idx === 4 && this.state.homeGuest) {
      this.setState(s => {
        const next = { ...s, homeGuestSheet: true };
        return { homeGuestSheet: true, activeFrameIndex: this.syncFrameIndexFromTab(s.activeTab, next) };
      });
      return;
    }
    this.setTab(idx)();
  };

  closeLoginNudge = () => this.setState({ homeLoginNudge: false });
  closePrivacyConsent = () => this.setState({ homePrivacyConsent: false });

  // Privacy/ATT pre-prompt "Continue" → fire the system ATT dialog (next screen).
  triggerAttPrompt = () => this.setState(s => {
    const next = { ...s, homePrivacyConsent: false, homeAttPrompt: true };
    return { homePrivacyConsent: false, homeAttPrompt: true, activeFrameIndex: this.syncFrameIndexFromTab(s.activeTab, next) };
  });
  // ATT dialog choice (Allow / Ask App Not to Track) → dismiss, back to Home.
  dismissAttPrompt = () => this.setState(s => {
    const next = { ...s, homeAttPrompt: false };
    return { homeAttPrompt: false, activeFrameIndex: this.syncFrameIndexFromTab(s.activeTab, next) };
  });
  triggerSignIn = () => { window.location.href = '../onboarding/Onboarding.dc.html#login'; };

  // Guest sign-in surfaces
  closeGuestSheet = () => this.setState(s => {
    const next = { ...s, homeGuestSheet: false };
    return { homeGuestSheet: false, activeFrameIndex: this.syncFrameIndexFromTab(s.activeTab, next) };
  });
  closeQaumNudge = () => this.setState({ qaumNudgeClosed: true });
  closeSalaahNudge = () => this.setState({ salaahNudgeClosed: true });
  openSalaahLoginSheet = () => this.setState({ salaahLoginSheet: true });
  closeSalaahLoginSheet = () => this.setState({ salaahLoginSheet: false });

  // No-masjid (follow-masjid) surfaces
  closeHomeFollowNudge = () => this.setState({ homeFollowNudge: false });
  closeMasjidSheet = () => this.setState(s => {
    const next = { ...s, masjidSheetOpen: false };
    return { masjidSheetOpen: false, activeFrameIndex: this.syncFrameIndexFromTab(s.activeTab, next) };
  });

  // Notification-permission surfaces (signed in with masjid, notifs off)
  closeHomeNotifNudge = () => this.setState({ homeNotifNudge: false });
  closeNotifSheet = () => this.setState(s => {
    const next = { ...s, notifSheetOpen: false };
    return { notifSheetOpen: false, activeFrameIndex: this.syncFrameIndexFromTab(s.activeTab, next) };
  });
  allowNotif = () => alert('Requesting notification permission…');

  // Guest sign-in interrupt sheet
  closeGuestSignInSheet = () => this.setState(s => {
    const next = { ...s, guestSignInSheetOpen: false };
    return { guestSignInSheetOpen: false, activeFrameIndex: this.syncFrameIndexFromTab(s.activeTab, next) };
  });

  // Reset to default settings
  resetToDefault = () => {
    this.setState({
      activeTab: 0,
      activeFrameIndex: 0,
      homeHeroSel: null,
      homeActivePrayer: 'Maghrib',
      homeGuest: false,
      homeLoginNudge: false,
      homeGuestSheet: false,
      homeNoMasjid: false,
      homeFollowNudge: false,
      masjidSheetOpen: false,
      homeNotifOff: false,
      homeNotifNudge: false,
      notifSheetOpen: false,
      guestSignInSheetOpen: false,
      qaumNudgeClosed: false,
      qaumContentState: 'ready',
      salaahNudgeClosed: false,
      salaahLoginSheet: false,
      homePrayers: { Fajr: true, Zohar: true, Asr: true, Maghrib: true, Isha: false },
      homeSehriNote: false,
      homeSlide: 0,
      quranTab: 0,
      quranContentState: 'ready',
      salaahShowMasjidSheet: false,
      profileLogoutOpen: false
    });
  };

  // Home handlers
  toggleSuhoor = () => this.setState(s => {
    const nextSel = s.homeHeroSel === 'suhoor' ? null : 'suhoor';
    return {
      homeHeroSel: nextSel,
      activeFrameIndex: this.syncFrameIndexFromTab(0, s)
    };
  });

  toggleIftaar = () => this.setState(s => {
    const nextSel = s.homeHeroSel === 'iftaar' ? null : 'iftaar';
    return {
      homeHeroSel: nextSel,
      activeFrameIndex: this.syncFrameIndexFromTab(0, s)
    };
  });

  toggleHomePrayer = (name) => this.setState(s => ({
    homePrayers: { ...s.homePrayers, [name]: !s.homePrayers[name] }
  }));

  triggerSehriNote = () => {
    this.setState({ homeSehriNote: true });
    clearTimeout(this._sehriTimer);
    this._sehriTimer = setTimeout(() => this.setState({ homeSehriNote: false }), 1500);
  };

  changeSlide = (dotIdx) => {
    this.setState({ homeSlide: dotIdx });
    const el = document.getElementById('qaum-carousel');
    if (el) el.scrollTo({ left: dotIdx * 250, behavior: 'smooth' });
  };

  toggleHajLike = () => this.setState(s => {
    const cur = s.homeLikes.haj;
    return { homeLikes: { ...s.homeLikes, haj: { liked: !cur.liked, count: cur.count + (cur.liked ? -1 : 1) } } };
  });

  toggleEidLike = () => this.setState(s => {
    const cur = s.homeLikes.eid;
    return { homeLikes: { ...s.homeLikes, eid: { liked: !cur.liked, count: cur.count + (cur.liked ? -1 : 1) } } };
  });

  toggleNotif = () => this.setState(s => ({ homeNotifOn: !s.homeNotifOn }));
  // Qaum handlers
  toggleQaumLike = (key) => this.setState(s => {
    const cur = s.qaumLikes[key];
    return { qaumLikes: { ...s.qaumLikes, [key]: { liked: !cur.liked, count: cur.count + (cur.liked ? -1 : 1) } } };
  });

  toggleQaumAudio = () => {
    this.setState(s => {
      const playing = !s.qaumAudioPlaying;
      if (playing) {
        clearInterval(this._audioTimer);
        this._audioTimer = setInterval(() => {
          this.setState(st => {
            const nextProg = st.qaumAudioProgress + 1;
            if (nextProg >= 22) {
              clearInterval(this._audioTimer);
              return { qaumAudioPlaying: false, qaumAudioProgress: 0 };
            }
            return { qaumAudioProgress: nextProg };
          });
        }, 1000);
      } else {
        clearInterval(this._audioTimer);
      }
      return { qaumAudioPlaying: playing };
    });
  };

  closeQaumAudio = () => {
    clearInterval(this._audioTimer);
    this.setState({ qaumAudioPlaying: false, qaumAudioProgress: 0, qaumDock: 'none' });
  };

  retryQaum = () => this.setState({ qaumContentState: 'loading', activeFrameIndex: 31 });

  transitionQaumMedia = (open) => {
    const update = () => this.setState(s => {
      const next = { ...s, qaumMediaOpen: open };
      return {
        qaumMediaOpen: open,
        activeFrameIndex: this.syncFrameIndexFromTab(s.activeTab, next)
      };
    });
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (!reduced && document.startViewTransition) document.startViewTransition(update);
    else update();
  };

  openQaumMedia = () => this.transitionQaumMedia(true);
  closeQaumMedia = () => this.transitionQaumMedia(false);

  // Quran handlers
  setQuranTab = (idx) => this.setState({ quranTab: idx });
  retryQuran = () => this.setState({ quranContentState: 'loading', activeFrameIndex: 34 });
  goReaderSurah = () => { window.location.href = '../Quran.dc.html#surah'; };
  goReaderJuz = () => { window.location.href = '../Quran.dc.html#juz'; };

  goHijri = () => {
    window.location.href = '../hijri/Hijri.dc.html#calendar';
  };

  goAsma = () => {
    window.location.href = '../asma-ul-husna/Asma ul Husna.dc.html';
  };

  goZakaat = () => {
    window.location.href = '../zakaat/Zakaat.dc.html#calculate';
  };

  goQibla = () => {
    window.location.href = '../qibla/Qibla.dc.html#permissions';
  };

  goDua = () => {
    window.location.href = '../dua-dikhr/Dua & Dikhr.dc.html#categories';
  };

  goMasjids = () => {
    // Guest carries into the explore board (follow attempts prompt sign-in there).
    window.location.href = '../masjid-explore/Explore Masjids.dc.html' + (this.state.homeGuest ? '#map-guest' : '#map');
  };

  // Tap the masjid name on Home / Salaah / Profile → open the My Masjids sheet on the
  // Masjid Onboarding board, deep-linked to the tab you came from.
  goMyMasjids = () => {
    const seg = this.state.activeTab === 3 ? 'salaah' : this.state.activeTab === 4 ? 'profile' : 'home';
    window.location.href = '../masjid-register/Masjid Onboarding.dc.html#my-masjids-' + seg;
  };

  goMasjidAdmin = () => {
    window.location.href = '../masjid-operations/Masjid Operations.dc.html#admin';
  };

  goSehri = () => {
    window.location.href = '../sehri/Sehri.dc.html#permission';
  };

  // Salaah handlers
  toggleSalaahMasjidSheet = () => this.setState(s => ({ salaahShowMasjidSheet: !s.salaahShowMasjidSheet }));
  
  selectSalaahMasjid = (name) => {
    const letter = name.includes('Bilal') ? 'B' : 'Q';
    const sub = name.includes('Bilal') ? 'Bannerghatta Road, Bengaluru' : 'Jayanagar, Bengaluru';
    this.setState({
      salaahMasjidLetter: letter,
      salaahMasjidName: name,
      salaahMasjidSub: sub,
      salaahShowMasjidSheet: false
    });
  };

  toggleSalaahCheck = (name) => this.setState(s => ({
    salaahPrayersChecked: { ...s.salaahPrayersChecked, [name]: !s.salaahPrayersChecked[name] }
  }));

  toggleSalaahAlert = (name) => this.setState(s => ({
    salaahPrayersAlert: { ...s.salaahPrayersAlert, [name]: !s.salaahPrayersAlert[name] }
  }));

  // Profile handlers
  toggleProfileLogoutSheet = () => this.setState(s => ({ profileLogoutOpen: !s.profileLogoutOpen }));

  noop = () => {};

  renderVals() {
    const s = this.state;

    // Home counts
    const homePrayersDone = Object.keys(s.homePrayers).filter(k => s.homePrayers[k]).length;

    return {
      activeFrameIndex: s.activeFrameIndex,
      syncLiveStateToFrame: this.syncLiveStateToFrame,
      resetToDefault: this.resetToDefault,
      noop: this.noop,

      // Bottom nav (shared BottomNav component)
      activeTab: s.activeTab,
      onNavSelect: this.onNavSelect,
      showBottomNav: !s.qaumMediaOpen,

      // Active tab selectors
      isHomeTab: s.activeTab === 0,
      isQaumTab: s.activeTab === 1,
      isQuranTab: s.activeTab === 2,
      isSalaahTab: s.activeTab === 3,
      isProfileTab: s.activeTab === 4,

      // Home Screen props
      homeHeroSel: s.homeHeroSel,
      homePrayers: s.homePrayers,
      homeActivePrayer: s.homeActivePrayer,
      homeSalaahCount: homePrayersDone + ' of 5 today',
      homeSehriNote: s.homeSehriNote,
      homeSlide: s.homeSlide,
      homeLikes: s.homeLikes,
      homeNotifOn: s.homeNotifOn,
      homeTrackingLoading: s.homeTrackingLoading,
      toggleSuhoor: this.toggleSuhoor,
      toggleIftaar: this.toggleIftaar,
      toggleHomePrayer: this.toggleHomePrayer,
      triggerSehriNote: this.triggerSehriNote,
      changeSlide: this.changeSlide,
      toggleHajLike: this.toggleHajLike,
      toggleEidLike: this.toggleEidLike,
      toggleNotif: this.toggleNotif,
      switchToTab2: this.switchToTab2,
      switchToTab3: this.switchToTab3,
      goHijri: this.goHijri,
      goAsma: this.goAsma,
      goDua: this.goDua,
      goSehri: this.goSehri,
      goMasjids: this.goMasjids,
      goMyMasjids: this.goMyMasjids,
      goMasjidAdmin: this.goMasjidAdmin,
      goZakaat: this.goZakaat,
      goQibla: this.goQibla,

      // Qaum Screen props
      qaumLikes: s.qaumLikes,
      toggleQaumLike: this.toggleQaumLike,
      qaumAudioPlaying: s.qaumAudioPlaying,
      qaumAudioProgress: s.qaumAudioProgress,
      toggleQaumAudio: this.toggleQaumAudio,
      qaumDock: s.qaumDock,
      qaumContentState: s.qaumContentState,
      qaumMediaOpen: s.qaumMediaOpen,
      qaumMediaTransitionEnabled: true,
      openQaumMedia: this.openQaumMedia,
      closeQaumMedia: this.closeQaumMedia,
      closeQaumAudio: this.closeQaumAudio,
      retryQaum: this.retryQaum,

      // Quran Screen props
      quranTab: s.quranTab,
      quranContentState: s.quranContentState,
      setQuranTab: this.setQuranTab,
      retryQuran: this.retryQuran,
      goReaderSurah: this.goReaderSurah,
      goReaderJuz: this.goReaderJuz,

      // Salaah Screen props
      salaahMasjidLetter: s.salaahMasjidLetter,
      salaahMasjidName: s.salaahMasjidName,
      salaahMasjidSub: s.salaahMasjidSub,
      toggleSalaahMasjidSheet: this.toggleSalaahMasjidSheet,
      salaahShowMasjidSheet: s.salaahShowMasjidSheet,
      selectSalaahMasjid: this.selectSalaahMasjid,
      salaahPrayersAlert: s.salaahPrayersAlert,
      salaahPrayersChecked: s.salaahPrayersChecked,
      toggleSalaahCheck: this.toggleSalaahCheck,
      toggleSalaahAlert: this.toggleSalaahAlert,

      // Profile Screen props
      profileLogoutOpen: s.profileLogoutOpen,
      profileUserName: s.profileUserName,
      profilePhone: s.profilePhone,
      profileHasMasjid: s.profileHasMasjid,
      profileManagedMasjid: s.profileManagedMasjid,
      toggleProfileLogoutSheet: this.toggleProfileLogoutSheet,

      // Guest and Login Nudge state
      homeGuest: s.homeGuest,
      homeLoginNudge: s.homeLoginNudge,
      closeLoginNudge: this.closeLoginNudge,
      triggerSignIn: this.triggerSignIn,
      homePrivacyConsent: s.homePrivacyConsent,
      closePrivacyConsent: this.closePrivacyConsent,
      triggerAttPrompt: this.triggerAttPrompt,
      homeAttPrompt: s.homeAttPrompt,
      dismissAttPrompt: this.dismissAttPrompt,

      // Guest sign-in surfaces (Qaum/Salaah inline nudges + LoginSheets)
      homeGuestSheet: s.homeGuestSheet,
      closeGuestSheet: this.closeGuestSheet,
      guestSheetPrimary: { text: 'Sign in', onClick: this.triggerSignIn },
      guestSheetSecondary: { text: 'Cancel', onClick: this.closeGuestSheet },
      qaumLoginNudge: s.homeGuest && !s.qaumNudgeClosed,
      closeQaumNudge: this.closeQaumNudge,
      salaahLoginNudge: s.homeGuest && !s.salaahNudgeClosed,
      closeSalaahNudge: this.closeSalaahNudge,
      salaahLoginSheet: s.salaahLoginSheet,
      openSalaahLoginSheet: this.openSalaahLoginSheet,
      closeSalaahLoginSheet: this.closeSalaahLoginSheet,

      // No-masjid (follow-masjid) surfaces
      homeNoMasjid: s.homeNoMasjid,
      homeUserName: s.homeGuest ? 'Guest' : 'Toufeeq Ahamed',
      homeMasjidLabel: (s.homeGuest || s.homeNoMasjid) ? 'Bangalore (Approx.)' : 'Masjid E Bilal',
      homeFollowNudge: s.homeFollowNudge,
      closeHomeFollowNudge: this.closeHomeFollowNudge,
      qaumFollowNudge: s.homeNoMasjid && !s.qaumNudgeClosed,
      salaahFollowNudge: s.homeNoMasjid && !s.salaahNudgeClosed,
      masjidSheetOpen: s.masjidSheetOpen,
      closeMasjidSheet: this.closeMasjidSheet,

      // Notification-permission surfaces (signed in with masjid, notifs off)
      homeNotifNudge: s.homeNotifNudge,
      closeHomeNotifNudge: this.closeHomeNotifNudge,
      qaumNotifNudge: s.homeNotifOff && !s.qaumNudgeClosed,
      salaahNotifNudge: s.homeNotifOff && !s.salaahNudgeClosed,
      notifSheetOpen: s.notifSheetOpen,
      closeNotifSheet: this.closeNotifSheet,
      allowNotif: this.allowNotif,

      // Guest sign-in interrupt sheet (NudgeSheetFactory.kt GuestSignIn)
      guestSignInSheetOpen: s.guestSignInSheetOpen,
      closeGuestSignInSheet: this.closeGuestSignInSheet,
      guestSignInPrimary: { text: 'Sign in', onClick: this.triggerSignIn },
      guestSignInSecondary: { text: 'Not now', onClick: this.closeGuestSignInSheet }
    };
  }
}
</script>
</body>
</html>
