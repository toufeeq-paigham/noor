<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="../support.js"></script>
<script src="../_theme/chrome.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="../_ds/noor-design-system-46f42e91-1858-412f-bdb6-560a6cc3df9f/colors_and_type.css">
  <link rel="stylesheet" href="../_theme/poc.css">
  <link rel="stylesheet" href="../_theme/components.css">
  <script src="../_ds/noor-design-system-46f42e91-1858-412f-bdb6-560a6cc3df9f/_ds_bundle.js"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0..1,0&amp;display=block">
  <link rel="stylesheet" href="../_theme/icons.css">
  <style>
    body{background:var(--canvas-bg);padding:36px 32px 90px;min-height:100vh;box-sizing:border-box}
    ::-webkit-scrollbar{display:none}*{-ms-overflow-style:none;scrollbar-width:none}
    @keyframes stepin { from{transform:translateX(28px);opacity:0} to{transform:translateX(0);opacity:1} }
    @keyframes stepback { from{transform:translateX(-28px);opacity:0} to{transform:translateX(0);opacity:1} }
    .step-fwd { animation:stepin var(--motion-emphasized) var(--ease-out) }
    .step-back { animation:stepback var(--motion-standard) var(--ease-out) }
    /* Guided direction arrow pulse (opacity only — the rotate transform is set inline) */
    @keyframes qpulse { 0%,100%{opacity:.6} 50%{opacity:1} }
    .qibla-arrow { animation:qpulse var(--motion-celebration) var(--ease-in-out) infinite }
    @media (prefers-reduced-motion: reduce) {
      .step-fwd,.step-back,.qibla-arrow { animation:none }
    }
  </style>
</helmet>

<!-- ── Page header (shared board chrome) ── -->
<x-import component="BoardHeader" from="../_theme/board.jsx"
          title="Qibla — Compass, Permissions &amp; AR Finder"
          subtitle="Grant location &amp; camera → the compass hands off to the AR view: guided arrows point you toward the Qibla, a prompt asks you to hold the phone upright, and the Kaaba appears once it's in view. The device on the right runs the whole flow; the board follows its state."
          hint-size="1440px,92px"></x-import>

<!-- ── Board ── -->
<div class="poc-stage">

  <!-- Storyboard rows (static, one row per flow) -->
  <div class="poc-frames">
    <x-import component="SetupRow" from="./storyboards/setup-row.jsx" active="{{ setupActive }}" on-select-frame="{{ selectSetupFrame }}" hint-size="760px,600px"></x-import>
    <x-import component="ARRow" from="./storyboards/ar-row.jsx" active="{{ arActive }}" on-select-frame="{{ selectArFrame }}" hint-size="1000px,600px"></x-import>
  </div>

  <!-- Live device (shared floating pane) — one continuous prototype: permissions → locating → AR -->
  <x-import component="BoardLive" from="../_theme/board.jsx" restart="{{ restart }}" hint-size="400px,900px">
        <x-import component="IOSDevice" from="../ios-frame.jsx" hint-size="402px,874px">
          <div style="width:100%;height:100%;position:relative;overflow:hidden;background:var(--color-surface-primary)">

            <!-- ════ STAGE · INITIAL (permissions / locating) ════ -->
            <sc-if value="{{ isInitialStage }}">
              <div class="{{ stepAnim }}" style="width:100%;height:100%;position:relative">
                <x-import component="InitialQiblaScreen" from="./storyboards/screens.jsx"
                          permission-state="{{ permissionState }}"
                          qibla-rel="{{ initQiblaRel }}"
                          on-grant="{{ onGrant }}"
                          on-close="{{ onClose }}"
                          hint-size="100%,100%">
                </x-import>
              </div>
            </sc-if>

            <!-- ════ STAGE · AR (searching / horizontal / inview) ════ -->
            <sc-if value="{{ isArStage }}">
              <div class="{{ stepAnim }}" style="width:100%;height:100%;position:relative">
                <x-import component="SmartQiblaScreen" from="./storyboards/screens.jsx"
                          stage="{{ arStage }}"
                          on-close="{{ onClose }}"
                          on-point-qibla="{{ onPointQibla }}"
                          on-lay-flat="{{ onLayFlat }}"
                          on-hold-upright="{{ onHoldUpright }}"
                          on-turn-away="{{ onTurnAway }}"
                          hint-size="100%,100%">
                </x-import>
              </div>
            </sc-if>

          </div>
        </x-import>
  </x-import>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {
    // 'permissions' | 'permissionDenied' | 'servicesDisabled' | 'locating' | 'searching' | 'horizontal' | 'inview'
    stage: ({
      '#ar': 'searching',
      '#permission-denied': 'permissionDenied',
      '#location-services': 'servicesDisabled',
      '#locating': 'locating',
    }[location.hash] || 'permissions'),
    stepDir: 'fwd',
  };

  componentWillUnmount() { clearTimeout(this._t); }

  // Grant → acquiring location → (auto) AR searching
  onGrant = () => {
    this.setState({ stage: 'locating', stepDir: 'fwd' });
    clearTimeout(this._t);
    this._t = setTimeout(() => this.setState({ stage: 'searching', stepDir: 'fwd' }), 1400);
  };

  onClose = () => { window.location.href = '../home/Home Screen.dc.html'; };

  // AR preview controls (a browser can't drive the real compass/accelerometer)
  onPointQibla = () => this.setState({ stage: 'inview', stepDir: 'fwd' });
  onLayFlat = () => this.setState({ stage: 'horizontal', stepDir: 'fwd' });
  onHoldUpright = () => this.setState({ stage: 'searching', stepDir: 'back' });
  onTurnAway = () => this.setState({ stage: 'searching', stepDir: 'back' });

  // Tap a storyboard frame → jump the live device to that state.
  selectSetupFrame = (i) => {
    clearTimeout(this._t);
    this.setState({ stage: ['permissions', 'permissionDenied', 'servicesDisabled', 'locating'][i] || 'permissions', stepDir: 'none' });
  };
  selectArFrame = (i) => { clearTimeout(this._t); this.setState({ stage: ['searching', 'horizontal', 'inview'][i] || 'searching', stepDir: 'none' }); };

  restart = () => { clearTimeout(this._t); this.setState({ stage: 'permissions', stepDir: 'back' }); };

  renderVals() {
    const s = this.state;
    const isInitial = ['permissions', 'permissionDenied', 'servicesDisabled', 'locating'].includes(s.stage);
    const isAr = !isInitial;

    return {
      isInitialStage: isInitial,
      isArStage: isAr,
      permissionState: {
        permissions: 'request', permissionDenied: 'denied', servicesDisabled: 'services', locating: 'locating'
      }[s.stage] || 'request',
      initQiblaRel: 300,
      arStage: s.stage,

      setupActive: { permissions:0, permissionDenied:1, servicesDisabled:2, locating:3 }[s.stage] ?? -1,
      arActive: s.stage === 'searching' ? 0 : (s.stage === 'horizontal' ? 1 : (s.stage === 'inview' ? 2 : -1)),

      stepAnim: s.stepDir === 'back' ? 'step-back' : (s.stepDir === 'none' ? '' : 'step-fwd'),

      onGrant: this.onGrant,
      onClose: this.onClose,
      onPointQibla: this.onPointQibla,
      onLayFlat: this.onLayFlat,
      onHoldUpright: this.onHoldUpright,
      onTurnAway: this.onTurnAway,
      selectSetupFrame: this.selectSetupFrame,
      selectArFrame: this.selectArFrame,
      restart: this.restart,
    };
  }
}
</script>
</body>
</html>
