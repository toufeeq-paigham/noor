<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<script src="./_theme/chrome.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/noor-design-system-46f42e91-1858-412f-bdb6-560a6cc3df9f/colors_and_type.css">
  <link rel="stylesheet" href="_theme/poc.css">
  <link rel="stylesheet" href="_theme/components.css">
  <script src="_ds/noor-design-system-46f42e91-1858-412f-bdb6-560a6cc3df9f/_ds_bundle.js"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0..1,0&amp;display=block">
  <link rel="stylesheet" href="_theme/icons.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@700&amp;display=swap">
  <style>
    @font-face{font-family:'AlQuranIndoPak';src:url('_ds/noor-design-system-46f42e91-1858-412f-bdb6-560a6cc3df9f/fonts/AlQuran-IndoPak.ttf') format('truetype')}
    @font-face{font-family:'QWBWSurah';src:url('_ds/noor-design-system-46f42e91-1858-412f-bdb6-560a6cc3df9f/fonts/QWBWSurah.ttf') format('truetype')}
    body{background:var(--canvas-bg);padding:36px 32px 90px;min-height:100vh;box-sizing:border-box}
    ::-webkit-scrollbar{display:none}*{-ms-overflow-style:none;scrollbar-width:none}

    /* Stage transition animations (shared with the other section boards) */
    @keyframes stepin { from{transform:translateX(28px);opacity:0} to{transform:translateX(0);opacity:1} }
    @keyframes stepback { from{transform:translateX(-28px);opacity:0} to{transform:translateX(0);opacity:1} }
    .step-fwd { animation:stepin var(--motion-standard) var(--ease-out) }
    .step-back { animation:stepback var(--motion-standard) var(--ease-out) }
  </style>
</helmet>

<!-- Pre-load Home components for storyboard row and live device (hidden from rendering).
     Order matters — HomeScreen depends on PromptCard + BottomNav (React Error #130). -->
<div style="display: none">
  <x-import component="PromptCard" from="./_theme/components.jsx" hint-size="0,0"></x-import>
  <x-import component="EmptyState" from="./_theme/components.jsx" hint-size="0,0"></x-import>
  <x-import component="BottomNav" from="./home/storyboards/nav-bar.jsx" hint-size="0,0"></x-import>
  <x-import component="HomeScreen" from="./home/storyboards/screens.jsx" hint-size="0,0"></x-import>
  <x-import component="QuranScreen" from="./home/storyboards/screens.jsx" hint-size="0,0"></x-import>
  <x-import component="QuranReaderScreen" from="./quran-reader.jsx" hint-size="0,0"></x-import>
</div>

<!-- ── Page header ── -->
<x-import component="BoardHeader" from="./_theme/board.jsx"
          title="Quran"
          subtitle="One board, one flow. Open the reader from the Home Quran card; the device on the right runs it, and the storyboard follows its state."
          index-href="Index.dc.html"
          hint-size="1440px,92px"></x-import>

<!-- ── Stage ── -->
<div class="poc-stage">

  <!-- Storyboard frames -->
  <div class="poc-frames">
    <x-import component="QuranReaderRow" from="./quran-reader.jsx"
              active="{{ readerActive }}"
              on-select-frame="{{ selectFrame }}"
              hint-size="1000px,620px">
    </x-import>
  </div>

  <!-- Live interactive device -->
  <x-import component="BoardLive" from="./_theme/board.jsx"
            restart="{{ restart }}"
            hint="Tap the Quran card on the Home Screen to open the reader."
            hint-size="400px,900px">
    <x-import component="IOSDevice" from="./ios-frame.jsx" hint-size="402px,874px">
      <div style="width:100%;height:100%;position:relative;overflow:hidden">

        <!-- ════ STAGE · HOME ════ -->
        <sc-if value="{{ isHomeStage }}">
          <div class="{{ stepAnim }}" style="position:absolute;inset:0;display:flex;flex-direction:column">
            <div style="flex:1;position:relative;overflow:hidden">
              <x-import component="HomeScreen" from="./home/storyboards/screens.jsx"
                        go-quran="{{ goListingStage }}"
                        hint-size="100%,100%">
              </x-import>
            </div>
            <x-import component="BottomNav" from="./home/storyboards/nav-bar.jsx"
                      active-index="0"
                      on-select="{{ onNavSelect }}"
                      hint-size="100%,84px">
            </x-import>
          </div>
        </sc-if>

        <!-- ════ STAGE · QURAN INDEX (Surah / Juz) ════ -->
        <sc-if value="{{ isListingStage }}">
          <div class="{{ stepAnim }}" style="position:absolute;inset:0;display:flex;flex-direction:column">
            <div style="flex:1;position:relative;overflow:hidden">
              <x-import component="QuranScreen" from="./home/storyboards/screens.jsx"
                        active-tab="{{ quranTab }}"
                        on-select-tab="{{ setQuranTab }}"
                        on-select-surah="{{ openReaderSurah }}"
                        on-select-juz="{{ openReaderJuz }}"
                        hint-size="100%,100%">
              </x-import>
            </div>
            <x-import component="BottomNav" from="./home/storyboards/nav-bar.jsx"
                      active-index="2"
                      on-select="{{ onNavSelect }}"
                      hint-size="100%,84px">
            </x-import>
          </div>
        </sc-if>

        <!-- ════ STAGE · READER ════ -->
        <sc-if value="{{ isReaderStage }}">
          <div class="{{ stepAnim }}" style="position:absolute;inset:0">
            <x-import component="QuranReaderScreen" from="./quran-reader.jsx"
                      origin="{{ origin }}"
                      settings-open="{{ settingsOpen }}"
                      show-translit="{{ showTranslit }}"
                      show-translation="{{ showTranslation }}"
                      arabic-size="{{ arabicSize }}"
                      content-state="{{ readerContentState }}"
                      on-back="{{ goListingStage }}"
                      on-toggle-settings="{{ toggleSettings }}"
                      on-close-settings="{{ closeSettings }}"
                      on-toggle-translit="{{ toggleTranslit }}"
                      on-toggle-translation="{{ toggleTranslation }}"
                      on-inc-font="{{ incFont }}"
                      on-dec-font="{{ decFont }}"
                      on-retry="{{ retryReader }}"
                      hint-size="100%,100%">
            </x-import>
          </div>
        </sc-if>

      </div>
    </x-import>
  </x-import>

</div>
</x-dc>

<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {
    stage: (location.hash === '#reader' || location.hash === '#surah' || location.hash === '#juz' || location.hash === '#settings' || location.hash === '#reader-loading' || location.hash === '#reader-empty' || location.hash === '#reader-error') ? 'reader'
         : (location.hash === '#index' || location.hash === '#listing' || location.hash === '#juz-index') ? 'listing'
         : 'home',
    origin: location.hash === '#juz' ? 'juz' : 'surah',
    quranTab: location.hash === '#juz-index' ? 1 : 0,
    settingsOpen: location.hash === '#settings',
    stepDir: 'none',
    showTranslit: true,
    showTranslation: true,
    arabicSize: 28,
    readerContentState: (location.hash === '#reader-loading') ? 'loading'
      : (location.hash === '#reader-empty') ? 'empty'
      : (location.hash === '#reader-error') ? 'error'
      : 'ready'
  };

  goHomeStage = () => this.setState({ stage: 'home', stepDir: 'back', settingsOpen: false });
  goListingStage = () => this.setState({ stage: 'listing', stepDir: 'fwd', settingsOpen: false });

  setQuranTab = (idx) => this.setState({ quranTab: idx });

  // Bottom-nav taps on the Home / Index stages. Home + Quran switch stages in-board;
  // the other three app tabs live on the Home board, so hand off there.
  onNavSelect = (idx) => {
    if (idx === 0) { this.setState({ stage: 'home', stepDir: 'back', settingsOpen: false }); return; }
    if (idx === 2) { this.setState({ stage: 'listing', stepDir: 'fwd', settingsOpen: false }); return; }
    const hash = idx === 1 ? '#qaum' : idx === 3 ? '#salaah' : '#profile';
    window.location.href = 'home/Home Screen.dc.html' + hash;
  };

  openReader = (origin) => this.setState({ stage: 'reader', origin, stepDir: 'fwd', settingsOpen: false, readerContentState: 'ready' });
  openReaderSurah = () => this.openReader('surah');
  openReaderJuz = () => this.openReader('juz');

  toggleSettings = () => this.setState(s => ({ settingsOpen: !s.settingsOpen }));
  closeSettings = () => this.setState({ settingsOpen: false });
  toggleTranslit = () => this.setState(s => ({ showTranslit: !s.showTranslit }));
  toggleTranslation = () => this.setState(s => ({ showTranslation: !s.showTranslation }));
  incFont = () => this.setState(s => ({ arabicSize: Math.min(36, s.arabicSize + 2) }));
  decFont = () => this.setState(s => ({ arabicSize: Math.max(22, s.arabicSize - 2) }));
  retryReader = () => this.setState({ readerContentState: 'loading', settingsOpen: false });

  // Storyboard frame click → jump the live device to that state.
  selectFrame = (i) => {
    if (i === 0) { this.setState({ stage: 'home', stepDir: 'none', settingsOpen: false }); return; }
    if (i === 1) { this.setState({ stage: 'listing', quranTab: 0, stepDir: 'none', settingsOpen: false }); return; }
    if (i === 2) { this.setState({ stage: 'listing', quranTab: 1, stepDir: 'none', settingsOpen: false }); return; }
    if (i === 3) { this.setState({ stage: 'reader', origin: 'surah', stepDir: 'none', settingsOpen: false }); return; }
    if (i === 4) { this.setState({ stage: 'reader', origin: 'juz', stepDir: 'none', settingsOpen: false }); return; }
    if (i === 5) { this.setState({ stage: 'reader', origin: 'surah', stepDir: 'none', settingsOpen: true }); return; }
    if (i === 6) { this.setState({ stage: 'reader', origin: 'surah', stepDir: 'none', settingsOpen: false, readerContentState: 'loading' }); return; }
    if (i === 7) { this.setState({ stage: 'reader', origin: 'surah', stepDir: 'none', settingsOpen: false, readerContentState: 'empty' }); return; }
    if (i === 8) { this.setState({ stage: 'reader', origin: 'surah', stepDir: 'none', settingsOpen: false, readerContentState: 'error' }); return; }
  };

  restart = () => this.setState({
    stage: 'home', origin: 'surah', quranTab: 0, stepDir: 'back', settingsOpen: false,
    showTranslit: true, showTranslation: true, arabicSize: 28, readerContentState: 'ready'
  });

  renderVals() {
    const s = this.state;

    // Map live state → storyboard frame index for the ring.
    let readerActive = 0;
    if (s.stage === 'listing') readerActive = s.quranTab === 1 ? 2 : 1;
    else if (s.stage === 'reader') {
      if (s.readerContentState === 'loading') readerActive = 6;
      else if (s.readerContentState === 'empty') readerActive = 7;
      else if (s.readerContentState === 'error') readerActive = 8;
      else readerActive = s.settingsOpen ? 5 : (s.origin === 'juz' ? 4 : 3);
    }

    return {
      isHomeStage: s.stage === 'home',
      isListingStage: s.stage === 'listing',
      isReaderStage: s.stage === 'reader',
      stepAnim: s.stepDir === 'fwd' ? 'step-fwd' : s.stepDir === 'back' ? 'step-back' : '',
      origin: s.origin,
      quranTab: s.quranTab,
      settingsOpen: s.settingsOpen,
      showTranslit: s.showTranslit,
      showTranslation: s.showTranslation,
      arabicSize: s.arabicSize,
      readerContentState: s.readerContentState,
      readerActive,
      setQuranTab: this.setQuranTab,
      goListingStage: this.goListingStage,
      onNavSelect: this.onNavSelect,
      openReaderSurah: this.openReaderSurah,
      openReaderJuz: this.openReaderJuz,
      goHomeStage: this.goHomeStage,
      toggleSettings: this.toggleSettings,
      closeSettings: this.closeSettings,
      toggleTranslit: this.toggleTranslit,
      toggleTranslation: this.toggleTranslation,
      incFont: this.incFont,
      decFont: this.decFont,
      retryReader: this.retryReader,
      selectFrame: this.selectFrame,
      restart: this.restart
    };
  }
}
</script>
</body>
</html>
