<helmet>
  <link rel="stylesheet" href="../_ds/noor-design-system-46f42e91-1858-412f-bdb6-560a6cc3df9f/colors_and_type.css">

  <style>
    body{background:var(--canvas-bg);padding:36px 32px 90px;min-height:100vh;box-sizing:border-box}
    ::-webkit-scrollbar{display:none}*{-ms-overflow-style:none;scrollbar-width:none}
    @keyframes spin { to { transform: rotate(360deg) } }
    @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .4 } }
    @keyframes stepin { from{transform:translateX(28px);opacity:0} to{transform:translateX(0);opacity:1} }
    @keyframes stepback { from{transform:translateX(-28px);opacity:0} to{transform:translateX(0);opacity:1} }
    .step-fwd { animation:stepin var(--motion-emphasized) var(--ease-out) }
    .step-back { animation:stepback var(--motion-standard) var(--ease-out) }
    .masjid-switch-action{min-width:92px;gap:6px}
    .masjid-switch-action .mi{font-size:18px}
    .registration-tile,.register-masjid-tile{width:100%;min-height:108px;box-sizing:border-box;border-radius:16px;font-family:var(--font-body);cursor:pointer}
    .registration-tile{display:flex;align-items:center;gap:10px;padding:12px;text-align:left;background:color-mix(in oklab,var(--color-status-warning) 8%,var(--color-surface-card));border:1px solid color-mix(in oklab,var(--color-status-warning) 40%,var(--color-neutral-border))}
    .registration-tile-icon{width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;border-radius:10px;background:color-mix(in oklab,var(--color-status-warning) 14%,transparent);color:var(--color-status-warning)}
    .registration-tile-copy{min-width:0;display:flex;flex:1;flex-direction:column;align-items:flex-start;gap:3px}
    .registration-tile-title{max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px;font-weight:700;color:var(--color-info-primary)}
    .registration-tile-subtitle{font-size:10.5px;line-height:1.35;color:var(--color-info-secondary)}
    .registration-tile-chevron{font-size:18px;color:var(--color-info-secondary)}
    .register-masjid-tile{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:12px;border:1.5px dashed var(--color-info-faint);background:transparent;color:var(--color-info-secondary);font-size:11px;font-weight:700}
    .register-masjid-tile .mi{font-size:22px}
    .masjid-manage-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:14px}
    .masjid-manage-grid-item-wide{grid-column:1 / -1}
    .picker-field{position:relative;width:100%;min-height:var(--control-h-lg);display:flex;align-items:center;justify-content:space-between;gap:10px;box-sizing:border-box;padding:0 var(--size-2xl);border:1px solid var(--color-input-border);border-radius:var(--radius-2xl);background:var(--color-input-background);color:var(--color-info-primary);font-family:var(--font-body);font-size:16px;text-align:left;cursor:pointer;overflow:hidden;transition:border-color var(--motion-quick) var(--ease-out),transform var(--motion-press) var(--ease-out)}
    .picker-field:active{transform:scale(.99)}
    .picker-field.error{border-color:var(--color-input-border-error)}
    .picker-field-placeholder{color:var(--color-input-text-placeholder)}
    .picker-field-value{font-weight:600;color:var(--color-input-text-primary)}
    .picker-field .mi{font-size:22px;color:var(--color-info-secondary)}
    .wizard-option-scrim{background:color-mix(in oklab,var(--color-surface-scrim) 88%,transparent);backdrop-filter:blur(8px) saturate(120%);-webkit-backdrop-filter:blur(8px) saturate(120%)}
    .wizard-option-sheet{max-height:68%;overflow:hidden;background:color-mix(in oklab,var(--color-surface-primary) 94%,transparent);backdrop-filter:blur(30px) saturate(165%);-webkit-backdrop-filter:blur(30px) saturate(165%)}
    .wizard-option-header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:var(--size-xl);flex-shrink:0}
    .wizard-option-list{display:flex;flex-direction:column;gap:var(--size-sm);overflow-y:auto}
    .wizard-option{width:100%;min-height:var(--control-h-lg);display:flex;align-items:center;justify-content:space-between;gap:12px;box-sizing:border-box;padding:12px 14px;border:1px solid var(--color-neutral-border);border-radius:var(--radius-xl);background:var(--color-surface-card);color:var(--color-info-primary);font-family:var(--font-body);font-size:15px;font-weight:600;text-align:left;cursor:pointer}
    .wizard-option.selected{border-color:var(--color-action-primary);background:var(--color-surface-secondary)}
    .wizard-option-mark{display:inline-flex;color:var(--color-action-primary)}
    .wizard-map{position:relative;height:188px;overflow:hidden;border:1px solid var(--color-neutral-border);border-radius:var(--radius-2xl);background:var(--color-surface-secondary);transition:height var(--motion-emphasized) var(--ease-out)}
    .wizard-map.expanded{height:330px}
    .wizard-map-grid{position:absolute;inset:-20%;opacity:.55;background-image:linear-gradient(var(--color-neutral-border) 1px,transparent 1px),linear-gradient(90deg,var(--color-neutral-border) 1px,transparent 1px);background-size:52px 52px;transform:rotate(-7deg) scale(1.15)}
    .wizard-map-road{position:absolute;left:-8%;right:-8%;top:48%;height:18px;transform:rotate(-11deg);border:1px solid var(--color-neutral-border);background:color-mix(in oklab,var(--color-surface-primary) 82%,transparent)}
    .wizard-map-pin{position:absolute;left:50%;top:50%;transform:translate(-50%,-100%);filter:drop-shadow(0 8px 12px color-mix(in oklab,var(--color-surface-scrim) 60%,transparent))}
    .wizard-map-pin .mi{font-size:46px;color:var(--color-action-primary)}
    .wizard-map-actions{position:absolute;right:10px;top:10px;display:flex;flex-direction:column;gap:8px}
    .wizard-map-status{position:absolute;left:10px;right:10px;bottom:10px;display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:12px;background:color-mix(in oklab,var(--color-surface-primary) 90%,transparent);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);font-family:var(--font-body);font-size:11.5px;font-weight:600;color:var(--color-info-primary)}
    .resolved-location{display:flex;align-items:flex-start;gap:10px;padding:12px;margin-bottom:16px;border:1px solid color-mix(in oklab,var(--color-action-primary) 34%,var(--color-neutral-border));border-radius:var(--radius-xl);background:color-mix(in oklab,var(--color-action-primary) 6%,var(--color-surface-card))}
    .resolved-location .mi{font-size:20px;color:var(--color-action-primary)}
    .camera-stage{position:absolute;inset:0;z-index:260;display:flex;flex-direction:column;background:var(--color-neutral-black);color:var(--color-neutral-white)}
    .camera-topbar{height:104px;display:flex;align-items:flex-end;justify-content:space-between;gap:12px;padding:0 18px 14px;box-sizing:border-box;background:linear-gradient(180deg,color-mix(in oklab,var(--color-neutral-black) 96%,transparent),transparent)}
    .camera-title{min-width:0;text-align:center;font-family:var(--font-body);font-size:15px;font-weight:700}
    .camera-title small{display:block;margin-top:3px;font-size:11px;font-weight:500;color:color-mix(in oklab,var(--color-neutral-white) 72%,transparent)}
    .camera-viewport{position:relative;flex:none;height:min(560px,calc(100% - 254px));min-height:320px;margin:0 14px;overflow:hidden;border-radius:var(--radius-huge);background:var(--color-neutral-black)}
    .camera-viewport img,.capture-thumbnail img,.review-photo img{width:100%;height:100%;display:block;object-fit:cover;object-position:center}
    .camera-viewport.selfie img,.capture-thumbnail.selfie.camera-source img,.review-photo.selfie.camera-source img{transform:scaleX(-1)}
    .camera-guide{position:absolute;inset:16px;border:1px solid color-mix(in oklab,var(--color-neutral-white) 44%,transparent);border-radius:calc(var(--radius-huge) - 4px);pointer-events:none}
    .camera-guide.selfie{inset:15% 20%;border-radius:48%}
    .camera-help{position:absolute;left:18px;right:18px;bottom:18px;padding:10px 12px;border-radius:12px;background:color-mix(in oklab,var(--color-neutral-black) 72%,transparent);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);font-family:var(--font-body);font-size:12px;line-height:1.4;text-align:center}
    .camera-controls{height:150px;display:grid;grid-template-columns:1fr 84px 1fr;align-items:center;padding:8px 28px 24px;box-sizing:border-box}
    .camera-control{justify-self:center;color:var(--color-neutral-white)}
    .camera-shutter{width:72px;height:72px;display:flex;align-items:center;justify-content:center;justify-self:center;border:3px solid var(--color-neutral-white);border-radius:var(--radius-circle);background:transparent;cursor:pointer}
    .camera-shutter::after{content:"";width:56px;height:56px;border-radius:var(--radius-circle);background:var(--color-neutral-white);transition:transform var(--motion-press) var(--ease-out)}
    .camera-shutter:active::after{transform:scale(.88)}
    .camera-capture-actions{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 18px 24px}
    .camera-capture-actions .camera-use-photo{width:100%}
    .camera-capture-actions .camera-retake-photo{min-height:44px;color:color-mix(in oklab,var(--color-neutral-white) 78%,transparent)}
    .camera-permission{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow-y:auto;padding:24px 32px 32px;text-align:center}
    .camera-permission-icon{width:76px;height:76px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;border-radius:var(--radius-circle);background:color-mix(in oklab,var(--color-neutral-white) 10%,transparent)}
    .camera-permission-icon .mi{font-size:36px}
    .camera-permission h2{margin:0 0 10px;font-family:var(--font-title);font-size:27px;font-weight:700;line-height:1.15}
    .camera-permission p{margin:0 0 24px;max-width:300px;font:14px/1.55 var(--font-body);color:color-mix(in oklab,var(--color-neutral-white) 72%,transparent)}
    .camera-permission .btn{width:100%;max-width:300px}
    .camera-permission-steps{max-width:300px;margin:0 0 24px;padding:12px 14px;border-radius:var(--radius-xl);background:color-mix(in oklab,var(--color-neutral-white) 8%,transparent);font:12px/1.5 var(--font-body);text-align:left}
    .camera-location-card{position:absolute;left:16px;top:16px;display:flex;align-items:center;gap:9px;width:min(214px,calc(100% - 32px));min-height:62px;padding:7px;box-sizing:border-box;border:1px solid color-mix(in oklab,var(--color-neutral-white) 24%,transparent);border-radius:var(--radius-xl);background:color-mix(in oklab,var(--color-neutral-black) 78%,transparent);box-shadow:0 10px 30px color-mix(in oklab,var(--color-neutral-black) 28%,transparent);backdrop-filter:blur(16px) saturate(125%);-webkit-backdrop-filter:blur(16px) saturate(125%);font-family:var(--font-body);color:var(--color-neutral-white)}
    .camera-location-map{position:relative;width:48px;height:48px;flex:0 0 48px;overflow:hidden;border-radius:10px;background:color-mix(in oklab,var(--color-action-primary) 16%,var(--color-neutral-black))}
    .camera-location-map::before{content:"";position:absolute;inset:-8px;background-image:linear-gradient(color-mix(in oklab,var(--color-neutral-white) 10%,transparent) 1px,transparent 1px),linear-gradient(90deg,color-mix(in oklab,var(--color-neutral-white) 10%,transparent) 1px,transparent 1px);background-size:13px 13px;transform:rotate(-8deg)}
    .camera-location-road{position:absolute;left:-10px;right:-10px;height:4px;border-radius:4px;background:color-mix(in oklab,var(--color-neutral-white) 42%,transparent)}
    .camera-location-road.road-one{top:18px;transform:rotate(-16deg)}
    .camera-location-road.road-two{top:29px;transform:rotate(31deg)}
    .camera-location-map .mi{position:absolute;left:50%;top:50%;z-index:1;font-size:22px;color:var(--color-action-primary);transform:translate(-50%,-52%);filter:drop-shadow(0 2px 4px color-mix(in oklab,var(--color-neutral-black) 46%,transparent))}
    .camera-location-copy{min-width:0;display:flex;flex:1;flex-direction:column;gap:2px}
    .camera-location-copy strong{font-size:10.5px;line-height:1.1;color:var(--color-action-primary)}
    .camera-location-copy span,.camera-location-copy small{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .camera-location-copy span{font-size:10.5px;font-weight:700;line-height:1.25}
    .camera-location-copy small{font-size:8.5px;line-height:1.25;color:color-mix(in oklab,var(--color-neutral-white) 70%,transparent)}
    .camera-location-status{position:absolute;left:16px;top:16px;display:flex;align-items:center;gap:6px;min-height:32px;padding:0 10px;border:1px solid color-mix(in oklab,var(--color-neutral-white) 22%,transparent);border-radius:var(--radius-xl);background:color-mix(in oklab,var(--color-neutral-black) 72%,transparent);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);font:700 10.5px/1 var(--font-body);color:var(--color-neutral-white)}
    .camera-location-status .mi{font-size:16px;color:var(--color-action-primary)}
    .camera-location-status.warning .mi{color:var(--color-status-warning)}
    .camera-location-recovery{position:absolute;left:16px;right:16px;top:64px;display:flex;align-items:center;gap:10px;padding:12px;border:1px solid color-mix(in oklab,var(--color-status-warning) 44%,transparent);border-radius:var(--radius-xl);background:color-mix(in oklab,var(--color-neutral-black) 84%,transparent);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);font:11px/1.45 var(--font-body);color:var(--color-neutral-white)}
    .camera-location-recovery div{flex:1}
    .camera-location-recovery .btn{flex-shrink:0}
    .photo-source-panel{position:relative;overflow:hidden;padding:18px;border:1px solid color-mix(in oklab,var(--color-action-primary) 34%,var(--color-neutral-border));border-radius:var(--radius-2xl);background:var(--gradient-emerald),var(--color-surface-card);box-shadow:0 18px 36px -28px color-mix(in oklab,var(--color-action-primary) 60%,transparent)}
    .photo-source-panel::after{content:"";position:absolute;width:140px;height:140px;right:-76px;top:-76px;border-radius:var(--radius-circle);background:color-mix(in oklab,var(--color-action-primary) 10%,transparent);pointer-events:none}
    .photo-source-panel.error{border-color:color-mix(in oklab,var(--color-status-error) 62%,var(--color-neutral-border));background:var(--gradient-emerald),color-mix(in oklab,var(--color-status-error) 3%,var(--color-surface-card))}
    .photo-source-intro{position:relative;z-index:1;display:flex;align-items:flex-start;gap:12px;margin-bottom:18px}
    .photo-source-icon{width:54px;height:54px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid color-mix(in oklab,var(--color-action-primary) 24%,transparent);border-radius:var(--radius-xl);background:color-mix(in oklab,var(--color-action-primary) 13%,var(--color-surface-card));box-shadow:0 12px 24px -18px color-mix(in oklab,var(--color-action-primary) 72%,transparent);color:var(--color-action-primary)}
    .photo-source-icon .mi{font-size:26px}
    .photo-source-title{margin:1px 0 4px;font:700 15px/1.35 var(--font-body);color:var(--color-info-primary)}
    .photo-source-copy{font:12px/1.5 var(--font-body);color:var(--color-info-secondary)}
    .photo-source-actions{position:relative;z-index:1;display:flex;flex-direction:column;gap:10px}
    .photo-source-actions .btn{width:100%}
    .photo-source-note{position:relative;z-index:1;display:flex;align-items:flex-start;justify-content:center;gap:6px;margin-top:13px;font:11px/1.45 var(--font-body);text-align:left;color:var(--color-info-secondary)}
    .photo-source-note .mi{flex-shrink:0;margin-top:1px;font-size:15px;color:var(--color-action-primary)}
    .photo-source-error{position:relative;z-index:1;display:flex;align-items:flex-start;gap:7px;margin:13px -2px -2px;padding:10px 11px;border-radius:var(--radius-xl);background:color-mix(in oklab,var(--color-status-error) 8%,var(--color-surface-card));font:12px/1.4 var(--font-body);color:var(--color-input-text-error)}
    .photo-source-error .mi{flex-shrink:0;font-size:17px}
    .capture-thumbnail{position:relative;width:100%;aspect-ratio:4/3;max-height:248px;overflow:hidden;border:1px solid var(--color-neutral-border);border-radius:var(--radius-2xl);background:var(--color-surface-secondary)}
    .photo-retake-action{width:100%;margin-top:10px}
    .photo-remove-action{width:100%;margin-top:6px;color:var(--color-status-error)}
    .review-photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .review-photo{position:relative;height:148px;overflow:hidden;border:1px solid var(--color-neutral-border);border-radius:var(--radius-xl);background:var(--color-surface-secondary)}
    .review-photo-label{position:absolute;left:8px;bottom:8px;display:flex;flex-direction:column;gap:2px;padding:6px 8px;border-radius:9px;background:color-mix(in oklab,var(--color-action-secondary-inverse) 78%,transparent);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);font-family:var(--font-body);color:var(--color-neutral-white)}
    .review-photo-label strong{font-size:10px;line-height:1.1}
    .review-photo-label small{font-size:8.5px;line-height:1.1;color:color-mix(in oklab,var(--color-neutral-white) 72%,transparent)}
    .review-photo-edit{position:absolute;top:6px;right:6px;min-width:44px;min-height:44px;padding:0 10px;border:1px solid color-mix(in oklab,var(--color-neutral-white) 22%,transparent);border-radius:var(--radius-xl);background:color-mix(in oklab,var(--color-action-secondary-inverse) 72%,transparent);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);font:700 10px/1 var(--font-body);color:var(--color-neutral-white);cursor:pointer}
    .review-section{margin-bottom:18px}
    .review-section-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px}
    .review-section-title{font:700 11px/1.2 var(--font-body);letter-spacing:.06em;text-transform:uppercase;color:var(--color-info-secondary)}
    .wizard-cta-feedback{min-height:18px;text-align:center;font:12px/18px var(--font-body);color:var(--color-input-text-error)}
    .outcome-screen>*{max-width:100%;box-sizing:border-box}
    .outcome-title{width:100%;overflow-wrap:anywhere}
    .outcome-summary{min-width:0;overflow:hidden}
    .outcome-summary-row{min-width:0;align-items:flex-start}
    .outcome-summary-label{flex:0 0 auto}
    .outcome-summary-value{min-width:0;max-width:62%;text-align:right;overflow-wrap:anywhere}
    @media (prefers-reduced-motion: reduce) {
      .step-fwd,.step-back,.registration-spinner { animation:none !important }
      .picker-field,.wizard-map,.camera-shutter::after{transition:none}
    }
  </style>
</helmet>

<!-- Preload cross-section deps then the screen libraries (deps first → prevents React #130).
     The 3 entry tabs reuse the REAL shared Home/Salaah/Profile screens. -->

  <x-import component="Dialog" from="../_theme/components.jsx" hint-size="0,0"></x-import>
  <x-import component="RichNudgeSheet" from="../_theme/components.jsx" hint-size="0,0"></x-import>

<!-- ── Board header ── -->
<x-import component="BoardHeader" from="../_theme/board.jsx"

<!-- ── Board ── -->
<div class="poc-stage">

    <x-import component="SheetRow" from="./storyboards/sheet-row.jsx" active="{{ sheetActive }}" on-select-frame="{{ selectFrame }}" hint-size="800px,600px"></x-import>
    <x-import component="JourneyRows" from="./storyboards/journey-rows.jsx" active="{{ wizardActive }}" on-select-frame="{{ selectFrame }}" hint-size="1800px,5200px"></x-import>
    <x-import component="OutcomeRow" from="./storyboards/outcome-row.jsx" active="{{ outcomeActive }}" on-select-frame="{{ selectFrame }}" hint-size="1000px,600px"></x-import>
  </div>

  <!-- Live device — one continuous prototype -->
  <x-import component="BoardLive" from="../_theme/board.jsx" restart="{{ restart }}" hint-size="400px,900px">
    <x-import component="IOSDevice" from="../ios-frame.jsx" hint-size="402px,874px">
      <div style="width:100%;height:100%;position:relative;overflow:hidden;background:var(--color-surface-primary)">
        <div class="{{ stepAnim }}" style="width:100%;height:100%;position:relative">
          <sc-if value="{{ isHomeStep }}">
            <x-import component="HomeScreen" from="../home/storyboards/screens.jsx"
                      prayer="{{ homePrayer }}" masjid-name="{{ masjidName }}" user-name="{{ userName }}"
                      on-masjid-tap="{{ openSheet }}" hint-size="100%,100%"></x-import>
          </sc-if>
          <sc-if value="{{ isSalaahStep }}">
            <x-import component="SalaahScreen" from="../home/storyboards/screens.jsx"

  // ── entry tabs + sheet ──

  // ── wizard field handlers ──
  clearError(key) {
    this.setState(s => ({ errors:{ ...s.errors, [key]:undefined }, ctaFeedback:'' }));
  }
  reportErrors(errors, feedback = 'Check the highlighted field and try again.') {
    this.setState({ errors, ctaFeedback:feedback });
  }
  resolvedPlace(pincode) {
    if (pincode.startsWith('400')) return { city:'Mumbai', stateVal:'Maharashtra' };
    if (pincode.startsWith('560')) return { city:'Bengaluru', stateVal:'Karnataka' };
    return null;
  }
  stateForPincode(pincode) {
    if (!/^\d{6}$/.test(pincode)) return null;
    if (pincode.startsWith('68255')) return 'Lakshadweep';
    const prefix = Number(pincode.slice(0, 3));
    if (prefix === 110) return 'Delhi';
    if (prefix >= 121 && prefix <= 136) return 'Haryana';
    if (prefix >= 140 && prefix <= 159) return 'Punjab';
    if (prefix >= 171 && prefix <= 177) return 'Himachal Pradesh';
    if (prefix >= 180 && prefix <= 193) return 'Jammu and Kashmir';
    if (prefix === 194) return 'Ladakh';
    if ((prefix >= 201 && prefix <= 243) || prefix === 245 || prefix === 247 || (prefix >= 250 && prefix <= 261) || (prefix >= 264 && prefix <= 285)) return 'Uttar Pradesh';
    if (prefix === 246 || prefix === 248 || prefix === 249 || prefix === 263) return 'Uttarakhand';
    if (prefix >= 301 && prefix <= 345) return 'Rajasthan';
    if (prefix >= 360 && prefix <= 395) return 'Gujarat';
    if (prefix === 403) return 'Goa';
    if (prefix >= 400 && prefix <= 445) return 'Maharashtra';
    if (prefix >= 450 && prefix <= 488) return 'Madhya Pradesh';
    if (prefix >= 490 && prefix <= 497) return 'Chhattisgarh';
    if (prefix >= 500 && prefix <= 509) return 'Telangana';
    if (prefix >= 515 && prefix <= 535) return 'Andhra Pradesh';
    if (prefix >= 560 && prefix <= 591) return 'Karnataka';
    if (prefix >= 600 && prefix <= 643 && prefix !== 605 && prefix !== 609) return 'Tamil Nadu';
    if (prefix >= 670 && prefix <= 695) return 'Kerala';
    if (prefix === 737) return 'Sikkim';
    if (prefix >= 700 && prefix <= 743) return 'West Bengal';
    if (prefix === 744) return 'Andaman and Nicobar Islands';
    if (prefix >= 751 && prefix <= 770) return 'Odisha';
    if (prefix >= 781 && prefix <= 788) return 'Assam';
    if (prefix >= 790 && prefix <= 792) return 'Arunachal Pradesh';
    if (prefix === 793 || prefix === 794) return 'Meghalaya';
    if (prefix === 795) return 'Manipur';
    if (prefix === 796) return 'Mizoram';
    if (prefix === 797 || prefix === 798) return 'Nagaland';
    if (prefix === 799) return 'Tripura';
    if (prefix >= 800 && prefix <= 813) return 'Bihar';
    if (prefix >= 814 && prefix <= 835) return 'Jharkhand';
    if (prefix >= 841 && prefix <= 855) return 'Bihar';
    return null;
  }
  onPincodeChange = (e) => {
    const pincode = e.target.value.replace(/\D/g, '').slice(0, 6);
    const mappedState = this.stateForPincode(pincode);
    this.setState(s => ({
      pincode,
      stateVal:mappedState || (s.stateAutoFilled ? '' : s.stateVal),
      stateAutoFilled:!!mappedState,
      errors:{ ...s.errors, pincode:undefined, stateVal:mappedState ? undefined : s.errors.stateVal },

  selectMasjid = (id) => this.setState(s => ({ selectedMasjidId:id, errors:{ ...s.errors, claim:undefined }, ctaFeedback:'' }));
  goRegisterManually = () => {
    const place = this.resolvedPlace(this.state.pincode);

      branch:'register',
      role:s.role || 'Chairman',
      city:place ? place.city : s.city,

  openStateSheet = () => this.setState(s => ({ stateSheetOpen:true, errors:{ ...s.errors, stateVal:undefined }, ctaFeedback:'' }));

  openMaslakSheet = () => this.setState(s => ({ maslakSheetOpen:true, errors:{ ...s.errors, maslak:undefined }, ctaFeedback:'' }));
  closeSheets = () => this.setState({ roleSheetOpen: false, maslakSheetOpen: false, stateSheetOpen: false });
  selectState = (stateVal) => this.setState(s => ({ stateVal, stateAutoFilled:false, stateSheetOpen:false, errors:{ ...s.errors, stateVal:undefined }, ctaFeedback:'' }));

  openCamera(mode) {
    this.setState({
      cameraMode:mode,
      cameraStage:this.state.cameraPermission === 'granted' ? 'ready' : 'rationale',

  takePhoto = () => this.openCamera('masjid');

    s.cameraMode === 'masjid' && s.captureLocationStatus === 'unavailable'

  ));
  retryCaptureLocation = () => this.setState({ captureLocationStatus:'ready', ctaFeedback:'' });
  retakeCamera = () => this.setState({ cameraStage:'ready' });
  useCapture = () => this.setState(s => ({

    cameraStage:'rationale',
    errors:s.cameraMode === 'selfie' ? { ...s.errors, selfie:undefined } : s.errors,
    ctaFeedback:''

  flipCamera = () => {};
  toggleFlash = () => {};

  editRegister = () => this.goTo('register');
  editContact = () => this.goTo('contact');
  editRole = () => this.goTo('role');
  editMaslak = () => this.goTo('maslak');
  editPhoto = () => this.goTo('photo');
  editSelfie = () => this.goTo('selfie');

  submit = () => { this.goTo('submitting'); clearTimeout(this._t); this._t = setTimeout(() => this.setState({ step:'pending' }), 1300); };
  doneHome = () => { window.location.href = '../home/Home Screen.dc.html'; };
  togglePreview = () => this.setState(s => ({ step: s.step === 'pending' ? 'rejected' : 'pending' }));
  reapply = () => this.goTo('contact');
  updateDetails = () => this.goTo('register');
  contactSupport = () => {};

  ctaFor(step) {
    const s = this.state;
    switch (step) {
      case 'pincode': {
        const valid = /^\d{6}$/.test(s.pincode);
        return { label:'Continue', disabled:false, onClick: () => {
          if (!valid) { this.reportErrors({ pincode:'Enter a valid 6-digit pincode.' }); return; }
          this.setState({ errors:{}, ctaFeedback:'' });
          this.goTo('searching');
          const target = s.pincode;
          clearTimeout(this._t);
          this._t = setTimeout(() => this.setState(st => ({ history:[...st.history, 'searching'], branch: target==='400001'?'claim':null, step: target==='400001'?'claimList':'claimEmpty' })), 1100);
        }};
      }
      case 'searching': return { label:'Searching nearby', disabled:true, busy:true, onClick: () => {} };
      case 'claimList': {
        const valid = s.selectedMasjidId != null;
        return { label:'Continue', disabled:false, onClick: () => {
          if (!valid) { this.reportErrors({ claim:'Choose your masjid, or add it manually.' }, 'Choose a masjid to continue.'); return; }
          this.setState({ branch:'claim', role:'', errors:{}, ctaFeedback:'' });
          this.goTo('contact');
        }};
      }
      case 'claimEmpty': return { label:'Register manually', disabled:false, onClick: this.goRegisterManually };
      case 'register': return { label:'Continue', disabled:false, onClick: () => {
        const errors = {};
        if (s.masjidName.trim().length < 3) errors.masjidName = 'Enter the masjid name.';
        if (!s.address.trim()) errors.address = 'Enter an address or nearby landmark.';
        if (!s.city.trim()) errors.city = 'Enter the city.';
        if (!s.stateVal.trim()) errors.stateVal = 'Enter the state.';
        if (!/^\d{6}$/.test(s.pincode)) errors.pincode = 'Enter a valid 6-digit pincode.';
        if (!s.pinDropped) errors.pinDropped = 'Pin the masjid entrance on the map.';
        if (Object.keys(errors).length) { this.reportErrors(errors); return; }
        this.setState({ errors:{}, ctaFeedback:'' });
        this.goTo('contact');
      }};
      case 'contact': return { label:'Continue', disabled:false, onClick: () => {
        if (s.contactName.trim().length < 2) { this.reportErrors({ contactName:'Enter the name of the person we should contact.' }); return; }
        this.setState({ errors:{}, ctaFeedback:'' });
        this.goTo('role');
      }};
      case 'role': return { label:'Continue', disabled:false, onClick: () => {
        if (!s.role) { this.reportErrors({ role:'Select your role at this masjid.' }, 'Select a role to continue.'); return; }
        this.setState({ errors:{}, ctaFeedback:'' });
        this.goTo('maslak');
      }};
      case 'maslak': return { label:'Continue', disabled:false, onClick: () => {
        if (!s.maslak) { this.reportErrors({ maslak:'Select the maslak followed by this masjid.' }, 'Select a maslak to continue.'); return; }
        this.setState({ errors:{}, ctaFeedback:'' });
        this.goTo('photo');
      }};
      case 'photo': return { label:'Continue', disabled:false, onClick: () => this.goTo('selfie') };
      case 'selfie': return { label:'Continue', disabled:false, onClick: () => {
        if (!s.selfieTaken) { this.setState({ errors:{ selfie:'Add an identity photo to continue.' }, ctaFeedback:'' }); return; }
        this.setState({ errors:{}, ctaFeedback:'' });
        this.goTo('review');
      }};
      case 'review': return { label:'Submit for verification', disabled:false, onClick: this.submit };
      default: return { label:'Continue', disabled:false, onClick: () => {} };
    }
  }

  renderVals() {
    const s = this.state;
    const isEntry = this.ENTRY_STEPS.includes(s.step);
    const isWizard = this.WIZARD_STEPS.includes(s.step);
    const isOutcome = ['submitting','pending','rejected'].includes(s.step);

    const navActive = { home:0, salaah:3, profile:4 }[s.step] || 0;

    // ring index for the current state
    const wizardIdxMap = {
      pincode:Object.keys(s.errors || {}).includes('pincode') ? 6 : 5,
      searching:7,
      claimList:s.selectedMasjidId != null ? 9 : 8,
      claimEmpty:10,
      register:s.stateSheetOpen ? 15 : (s.locationExpanded ? 14 : (s.locationLookupFailed ? 13 : (Object.keys(s.errors || {}).length ? 12 : 11))),
      contact:(s.errors || {}).contactName ? 17 : 16,
      role:s.roleSheetOpen ? 20 : ((s.errors || {}).role ? 19 : 18),
      maslak:s.maslakSheetOpen ? 23 : ((s.errors || {}).maslak ? 22 : 21),
      photo:s.cameraMode === 'masjid'
        ? (s.captureLocationStatus === 'unavailable' ? 30 : (s.cameraPermission === 'denied' ? 28 : (s.cameraPermission !== 'granted' ? 25 : (s.cameraStage === 'captured' ? 27 : 26))))
        : (s.photoTaken ? 29 : 24),
      selfie:s.cameraMode === 'selfie'
        ? (s.cameraPermission === 'denied' ? 35 : (s.cameraPermission !== 'granted' ? 32 : (s.cameraStage === 'captured' ? 34 : 33)))
        : (s.selfieTaken ? 36 : 31),
      review:s.photoTaken ? 37 : 38
    };
    const outcomeIdxMap = { submitting:39, pending:40, rejected:41 };
    let entryActive = -1, sheetActive = -1, wizardActive = -1, outcomeActive = -1;
    if (isEntry && s.sheetOpen) sheetActive = s.sheetTab === 'follow' ? 4 : 3;
    else if (isEntry) entryActive = { home:0, salaah:1, profile:2 }[s.step];
    else if (isWizard) wizardActive = wizardIdxMap[s.step];
    else if (isOutcome) outcomeActive = outcomeIdxMap[s.step];

    const manageTiles = this.MANAGE.map(m => ({ ...m, isPrimary: m.id === s.primaryMasjidId, onSelect: () => this.selectPrimary(m.id) }));
    const followRows = this.FOLLOW.map((f) => ({ ...f, checked: f.id === s.primaryMasjidId, onToggle: () => this.selectPrimary(f.id) }));
    const registration = this.REGISTRATION ? { ...this.REGISTRATION, onOpen: this.openPendingRegistration } : null;
    const claimResults = this.CLAIM.map(m => ({ ...m, selected: s.selectedMasjidId === m.id, onSelect: () => this.selectMasjid(m.id) }));
    const stateOptions = this.STATES.map(stateVal => ({ name:stateVal, selected: s.stateVal === stateVal, onSelect: () => this.selectState(stateVal) }));
    const roleOptions = this.ROLES.map(r => ({ name:r, selected: s.role === r, onSelect: () => this.selectRole(r) }));
    const maslakOptions = this.MASLAKS.map(m => ({ name:m, selected: s.maslak === m, onSelect: () => this.selectMaslak(m) }));

    const masjidLocked = s.branch === 'claim';
    const sel = this.CLAIM.find(m => m.id === s.selectedMasjidId);
    const masjidSummaryName = masjidLocked ? (sel ? sel.name : '') : (s.masjidName || '—');
    const masjidSummaryAddr = masjidLocked ? (sel ? sel.addr : '') : ([s.address, s.city, s.stateVal].filter(Boolean).join(', ') || '—');
    const cta = this.ctaFor(s.step);

    return {
      isEntryStep: isEntry,
      isHomeStep: s.step === 'home',
      isSalaahStep: s.step === 'salaah',
      isProfileStep: s.step === 'profile',
      isWizardStep: isWizard,
      isOutcomeStep: isOutcome,

      entryActive,
      sheetActive,
      wizardActive,
      outcomeActive,
      selectFrame: this.selectFrame,
      restart: this.restart,
      stepAnim: s.stepDir === 'back' ? 'step-back' : 'step-fwd',

      navActive,
      selectNav: this.selectNav,
      masjidName: s.masjidName, userName: s.userName,
      homePrayer: 'Asr',
      openSheet: this.openSheet,
      startWizard: this.startWizard,

      myMasjidsData: { isOpen: isEntry && s.sheetOpen, tab: s.sheetTab, onTab: this.setSheetTab, manageTiles, followRows, registration, onClose: this.closeSheet, onRegister: this.startWizard, onFind: this.goExplore },

      wizardData: {
        step: s.step,
        progressIndex: this.STEP_PROGRESS[s.step] || 1,
        onBack: this.goBack,
        ctaLabel: cta.label, ctaDisabled: cta.disabled, ctaBusy:cta.busy, ctaOnClick: cta.onClick, ctaFeedback:s.ctaFeedback,
        errors:s.errors,
        showSkipLink: false,
        pincode: s.pincode, onPincodeChange: this.onPincodeChange,
        claimResults, onRegisterManually: this.goRegisterManually,
        masjidName: s.masjidName, address: s.address, city: s.city, stateVal: s.stateVal,
        onMasjidNameChange: this.onMasjidNameChange, onAddressChange: this.onAddressChange, onCityChange: this.onCityChange,
        stateSheetOpen:s.stateSheetOpen, stateOptions, onOpenStateSheet:this.openStateSheet,
        pinDropped: s.pinDropped, onTogglePin: this.togglePin,
        locationExpanded:s.locationExpanded, locationResolved:s.locationResolved, locationLookupFailed:s.locationLookupFailed,
        onToggleLocationExpanded:this.toggleLocationExpanded, onRecenterLocation:this.recenterLocation,
        contactName: s.contactName, onContactNameChange: this.onContactNameChange,
        roleDisplay: s.role || 'Select your role', roleFilled: !!s.role, onOpenRoleSheet: this.openRoleSheet, roleSheetOpen: s.roleSheetOpen, roleOptions,
        maslakDisplay: s.maslak || 'Select maslak', maslakFilled: !!s.maslak, onOpenMaslakSheet: this.openMaslakSheet, maslakSheetOpen: s.maslakSheetOpen, maslakOptions,
        onCloseSheets: this.closeSheets,
        photoTaken:s.photoTaken, photoSrc:s.photoSrc, photoLocationAttached:s.photoLocationAttached,
        onTakePhoto:this.takePhoto, onRetakePhoto:this.takePhoto, onRemovePhoto:this.removePhoto,
        selfieTaken:s.selfieTaken, selfieSrc:s.selfieSrc,
        onTakeSelfie:this.takeSelfie, onRetakeSelfie:this.takeSelfie,
        cameraMode:s.cameraMode, cameraStage:s.cameraStage, cameraPermission:s.cameraPermission,
        captureLocationStatus:s.captureLocationStatus,
        capturePlace:s.capturePlace, captureCoordinates:s.captureCoordinates, captureAccuracy:s.captureAccuracy,
        onAllowCamera:this.allowCamera, onOpenCameraSettings:this.openCameraSettings, onCloseCamera:this.closeCamera,
        onCapture:this.capturePhoto, onRetakeCamera:this.retakeCamera, onUseCapture:this.useCapture,
        onRetryCaptureLocation:this.retryCaptureLocation, onFlipCamera:this.flipCamera, onToggleFlash:this.toggleFlash,
        masjidLocked, masjidSummaryName, masjidSummaryAddr, role: s.role, maslak: s.maslak,
        onEditRegister: this.editRegister, onEditContact: this.editContact, onEditRole: this.editRole, onEditMaslak: this.editMaslak, onEditPhoto: this.editPhoto, onEditSelfie: this.editSelfie
      },

      outcomeData: {
        variant: s.step, contactName: s.contactName, masjidSummaryName, role: s.role, submittedDate: '5 Jul 2026',
        onDone: this.doneHome, onUpdate: this.updateDetails, onReapply: this.reapply, onContactSupport: this.contactSupport, onTogglePreview: this.togglePreview
      }
    };
  }
}
</script>
