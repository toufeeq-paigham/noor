<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/noor-design-system-46f42e91-1858-412f-bdb6-560a6cc3df9f/colors_and_type.css">
  <script src="_ds/noor-design-system-46f42e91-1858-412f-bdb6-560a6cc3df9f/_ds_bundle.js"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0..1,0&amp;display=block">
  <style>
    @keyframes scanLine{0%{top:20%}50%{top:75%}100%{top:20%}}
    body{background:#E8E4DE;display:flex;justify-content:center;align-items:flex-start;padding:40px 20px 60px;min-height:100vh;box-sizing:border-box}
    ::-webkit-scrollbar{display:none}*{-ms-overflow-style:none;scrollbar-width:none}
  </style>
</helmet>

<div style="display:flex;flex-direction:column;align-items:center;gap:40px">

  <!-- Scanning state -->
  <div style="display:flex;flex-direction:column;align-items:center;gap:12px">
    <div style="font:600 11px/1 system-ui;color:rgba(60,50,40,.42);letter-spacing:.08em;text-transform:uppercase">Scan QR · Paigham app</div>

    <x-import component="IOSDevice" from="./ios-frame.jsx" dark="" hint-size="402px,874px">
      <div style="width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;background:#1A1A1A;position:relative">

        <!-- Camera view -->
        <div style="position:absolute;inset:0;background:radial-gradient(ellipse at center,#2E2A24 0%,#151210 100%)">
          <!-- Room texture lines -->
          <div style="position:absolute;top:18%;left:5%;right:5%;height:1px;background:rgba(255,255,255,0.04)"></div>
          <div style="position:absolute;top:45%;left:0;right:0;height:1px;background:rgba(255,255,255,0.03)"></div>
          <div style="position:absolute;left:30%;top:0;bottom:0;width:1px;background:rgba(255,255,255,0.03)"></div>
        </div>

        <!-- AppBar -->
        <div style="flex-shrink:0;display:flex;align-items:center;gap:12px;padding:12px 16px 10px;position:relative;z-index:10">
          <x-import component-from-global-scope="TonalIconButton" icon="arrow_back" color="#FFFFFF" size="sm" hint-size="32px,32px"></x-import>
          <span style="font-family:'Nunito',sans-serif;font-size:18px;font-weight:700;color:var(--color-info-primary);text-shadow:0 1px 4px rgba(0,0,0,0.5)">Scan QR at your Masjid</span>
        </div>

        <!-- QR frame area -->
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;position:relative;z-index:10">
          <!-- Frame -->
          <div style="position:relative;width:240px;height:240px">
            <!-- Corner brackets -->
            <!-- Top-left -->
            <div style="position:absolute;top:0;left:0;width:40px;height:40px;border-top:4px solid var(--color-action-primary);border-left:4px solid var(--color-action-primary);border-radius:8px 0 0 0"></div>
            <!-- Top-right -->
            <div style="position:absolute;top:0;right:0;width:40px;height:40px;border-top:4px solid var(--color-action-primary);border-right:4px solid var(--color-action-primary);border-radius:0 8px 0 0"></div>
            <!-- Bottom-left -->
            <div style="position:absolute;bottom:0;left:0;width:40px;height:40px;border-bottom:4px solid var(--color-action-primary);border-left:4px solid var(--color-action-primary);border-radius:0 0 0 8px"></div>
            <!-- Bottom-right -->
            <div style="position:absolute;bottom:0;right:0;width:40px;height:40px;border-bottom:4px solid var(--color-action-primary);border-right:4px solid var(--color-action-primary);border-radius:0 0 8px 0"></div>
            <!-- Interior tinted -->
            <div style="position:absolute;inset:0;background:rgba(255,255,255,0.06);border-radius:8px"></div>
            <!-- Scanning line -->
            <div style="position:absolute;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,var(--color-action-primary),transparent);animation:scanLine 2s ease-in-out infinite;top:40%"></div>
          </div>
          <!-- Instruction text -->
          <div style="margin-top:28px;font-family:'Nunito',sans-serif;font-size:14px;color:rgba(255,255,255,0.75);text-align:center">Align QR code within the frame</div>
        </div>

      </div>
    </x-import>
  </div>

  <!-- Result state -->
  <div style="display:flex;flex-direction:column;align-items:center;gap:12px">
    <div style="font:600 11px/1 system-ui;color:rgba(60,50,40,.42);letter-spacing:.08em;text-transform:uppercase">QR result · Paigham app</div>

    <x-import component="IOSDevice" from="./ios-frame.jsx" dark="" hint-size="402px,874px">
      <div style="width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;background:#1A1A1A;position:relative">

        <!-- Camera -->
        <div style="position:absolute;inset:0;background:radial-gradient(ellipse at center,#2A2820 0%,#101010 100%);opacity:0.55"></div>

        <!-- AppBar -->
        <div style="flex-shrink:0;display:flex;align-items:center;gap:12px;padding:12px 16px 10px;position:relative;z-index:10">
          <x-import component-from-global-scope="TonalIconButton" icon="arrow_back" color="#FFFFFF" size="sm" hint-size="32px,32px"></x-import>
          <span style="font-family:'Nunito',sans-serif;font-size:18px;font-weight:700;color:#fff">Scan QR at your Masjid</span>
        </div>

        <!-- QR frame (smaller, scanned) -->
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;position:relative;z-index:10;padding-bottom:280px">
          <div style="position:relative;width:220px;height:220px">
            <div style="position:absolute;top:0;left:0;width:36px;height:36px;border-top:4px solid var(--color-action-primary);border-left:4px solid var(--color-action-primary);border-radius:8px 0 0 0"></div>
            <div style="position:absolute;top:0;right:0;width:36px;height:36px;border-top:4px solid var(--color-action-primary);border-right:4px solid var(--color-action-primary);border-radius:0 8px 0 0"></div>
            <div style="position:absolute;bottom:0;left:0;width:36px;height:36px;border-bottom:4px solid var(--color-action-primary);border-left:4px solid var(--color-action-primary);border-radius:0 0 0 8px"></div>
            <div style="position:absolute;bottom:0;right:0;width:36px;height:36px;border-bottom:4px solid var(--color-action-primary);border-right:4px solid var(--color-action-primary);border-radius:0 0 8px 0"></div>
            <div style="position:absolute;inset:0;background:rgba(0,201,80,0.08);border-radius:8px"></div>
            <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;font-size:11px;color:rgba(255,255,255,0.3)">Align QR code within the frame</div>
          </div>
        </div>

        <!-- Result bottom sheet -->
        <div style="position:absolute;bottom:0;left:0;right:0;z-index:20;background:#131417;border-radius:24px 24px 0 0;padding:16px 20px 36px;border-top:1px solid rgba(255,255,255,0.1)">
          <div style="display:flex;justify-content:center;margin-bottom:14px">
            <div style="width:36px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px"></div>
          </div>
          <div style="font-family:'DM Serif Display',Georgia,serif;font-size:22px;color:var(--color-info-primary);margin-bottom:4px">Masjid E Tauheed</div>
          <div style="font-family:'Nunito',sans-serif;font-size:13px;color:rgba(255,255,255,0.45);margin-bottom:16px">Kotturu - 583134</div>
          <!-- Masjid card -->
          <div style="background:#080D08;border:1px solid rgba(0,201,80,0.22);border-radius:14px;padding:14px;margin-bottom:16px">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
              <div style="width:40px;height:40px;border-radius:50%;background:#2A3545;flex-shrink:0;display:flex;align-items:center;justify-content:center">
                <span style="font-family:'Nunito',sans-serif;font-size:16px;font-weight:700;color:#fff">M</span>
              </div>
              <div>
                <div style="font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;color:#fff">Masjid E Tauheed</div>
                <div style="font-family:'Nunito',sans-serif;font-size:12px;color:rgba(255,255,255,0.45)">Kotturu - 583134</div>
              </div>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center">
              <div>
                <div style="font-family:'Nunito',sans-serif;font-size:13px;color:rgba(255,255,255,0.35)">—</div>
                <div style="font-family:'Nunito',sans-serif;font-size:12px;color:var(--color-status-disabled-alt)">Prayer times not available</div>
              </div>
              <x-import component-from-global-scope="TonalIconButton" icon="near_me" color="#FFFFFF" size="sm" hint-size="32px,32px"></x-import>
            </div>
          </div>
          <x-import component-from-global-scope="FilledButton" hint-size="100%,48px">Follow</x-import>
        </div>

      </div>
    </x-import>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {}
</script>
</body>
</html>
