<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="../support.js"></script>
<script src="../_theme/chrome.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="../_ds/noor-design-system-46f42e91-1858-412f-bdb6-560a6cc3df9f/colors_and_type.css">
  <link rel="stylesheet" href="../_theme/poc.css">
  <link rel="stylesheet" href="../_theme/components.css">
  <script src="../_ds/noor-design-system-46f42e91-1858-412f-bdb6-560a6cc3df9f/_ds_bundle.js"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0..1,0&amp;display=block">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@700&amp;display=swap">
  <style>
    body{background:var(--canvas-bg);padding:36px 32px 90px;min-height:100vh;box-sizing:border-box}
    ::-webkit-scrollbar{display:none}*{-ms-overflow-style:none;scrollbar-width:none}
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes lfshake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
    @keyframes spin { to { transform: rotate(360deg) } }
    @keyframes bannerin { from{transform:translateY(-130%);opacity:0} to{transform:translateY(0);opacity:1} }
    @keyframes stepin { from{transform:translateX(28px);opacity:0} to{transform:translateX(0);opacity:1} }
    @keyframes stepback { from{transform:translateX(-28px);opacity:0} to{transform:translateX(0);opacity:1} }
    .lf-cursor { display:inline-block; width:2px; height:22px; background:var(--color-action-primary); border-radius:1px; animation:blink 1s step-end infinite; vertical-align:middle; margin-left:1px }
    .otp-cursor { width:1.5px; height:18px; background:var(--color-input-text); animation:blink 1s steps(1) infinite; display:inline-block; vertical-align:middle }
    .otp-banner { animation:bannerin .5s cubic-bezier(.2,.8,.2,1) }
    .step-fwd { animation:stepin .35s cubic-bezier(.2,.8,.2,1) }
    .step-back { animation:stepback .35s cubic-bezier(.2,.8,.2,1) }
    .kp-key:active { filter:brightness(0.92) }
    [data-theme="dark"] .kp-key:active { filter:brightness(1.25) }
  </style>
</helmet>

<!-- ── Page header (shared board chrome) ── -->
<x-import component="BoardHeader" from="../_theme/board.jsx"
          title="Onboarding — Intro → Login"
          subtitle="One board, two flows. The device on the right runs the whole sequence; the board follows its state."
          hint-size="1440px,92px"></x-import>

<!-- ── Board ── -->
<div class="poc-stage">

  <!-- Storyboard rows (static, one row per flow) -->
  <div class="poc-frames">
    <x-import component="IntroRow" from="./storyboards/intro-row.jsx" active="{{ introActive }}" hint-size="760px,560px"></x-import>
    <x-import component="PhoneRow" from="./storyboards/phone-row.jsx" active="{{ phoneActive }}" hint-size="760px,600px"></x-import>
    <x-import component="OtpRow" from="./storyboards/otp-row.jsx" active="{{ otpActive }}" hint-size="1000px,600px"></x-import>
  </div>

  <!-- Live device (shared floating pane) — one continuous prototype: intro → phone → OTP -->
  <x-import component="BoardLive" from="../_theme/board.jsx" restart="{{ restart }}" hint-size="400px,900px">
        <x-import component="IOSDevice" from="../ios-frame.jsx" hint-size="402px,874px">
          <div style="width:100%;height:100%;position:relative;overflow:hidden;background:#1a100a">

            <!-- ════ STAGE · INTRO ════ -->
            <sc-if value="{{ isIntroStage }}">
              <x-import component="IntroScreen" from="./storyboards/screens.jsx"
                        slide="{{ activeSlide }}"
                        show-skip="{{ showSkip }}"
                        cta-label="{{ ctaLabel }}"
                        active-dot-idx="{{ activeDotIdx }}"
                        on-skip="{{ skip }}"
                        on-cta="{{ nextOrStart }}"
                        on-select-dot="{{ selectDot }}"
                        hint-size="100%,100%">
              </x-import>
            </sc-if>

            <!-- ════ STAGE · LOGIN (phone → OTP) ════ -->
            <sc-if value="{{ isLoginStage }}">
              <div class="{{ stepAnim }}" style="width:100%;height:100%;position:relative">
                <sc-if value="{{ isPhoneStep }}">
                  <x-import component="PhoneScreen" from="./storyboards/screens.jsx"
                            phone-display="{{ phoneDisplay }}"
                            phone-mask="{{ phoneMask }}"
                            phone-error="{{ phoneError }}"
                            phone-focused="{{ phoneCursor }}"
                            on-continue="{{ onContinue }}"
                            on-back="{{ goBack }}"
                            on-key-press="{{ pressKeyFromComponent }}"
                            hint-size="100%,100%">
                  </x-import>
                </sc-if>
                <sc-if value="{{ isOtpStep }}">
                  <x-import component="OtpScreen" from="./storyboards/screens.jsx"
                            phone-fmt="{{ phoneFmt }}"
                            otp="{{ otp }}"
                            otp-error="{{ showOtpError }}"
                            verifying="{{ showVerifying }}"
                            success="{{ showSuccess }}"
                            resend-in="{{ resendIn }}"
                            sms-visible="{{ smsVisible }}"
                            on-edit-phone="{{ editPhone }}"
                            on-resend="{{ resend }}"
                            on-back="{{ goBack }}"
                            on-key-press="{{ pressKeyFromComponent }}"
                            hint-size="100%,100%">
                  </x-import>
                </sc-if>
              </div>
            </sc-if>

          </div>
        </x-import>
  </x-import>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  CODE = '353357';

  state = {
    stage: (location.hash === '#login' ? 'phone' : 'intro'),   // 'intro' | 'phone' | 'otp'
    slide: 0,
    stepDir: 'fwd',
    phone: '',
    phoneError: false,
    otp: '',
    otpError: false,
    verifying: false,
    success: false,
    resendIn: 30,
    smsVisible: false,
  };

  slideData = [
    { name: 'Qaum', img: '../uploads/intro_qaum.webp', pos: 'center top',
      gradient: 'linear-gradient(to bottom,rgba(0,0,0,0.04) 0%,rgba(0,0,0,0.1) 38%,rgba(0,0,0,0.45) 60%,rgba(0,0,0,0.72) 80%,rgba(0,0,0,0.82) 100%)',
      title: 'Your Qaum, connected',
      sub: 'Follow your local Masjid, get announcements, and stay connected to your community' },
    { name: 'Salaah', img: '../uploads/intro_salaah.webp', pos: 'center',
      gradient: 'linear-gradient(to bottom,rgba(0,0,0,0.04) 0%,rgba(0,0,0,0.1) 38%,rgba(0,0,0,0.48) 62%,rgba(0,0,0,0.74) 80%,rgba(0,0,0,0.84) 100%)',
      title: 'Your Salah, on time',
      sub: 'Prayer times, Qibla direction, and reminders for all five daily prayers' },
    { name: 'Ibadah', img: '../uploads/intro_ibadah.webp', pos: 'center',
      gradient: 'linear-gradient(to bottom,rgba(0,0,0,0.04) 0%,rgba(0,0,0,0.1) 38%,rgba(0,0,0,0.48) 62%,rgba(0,0,0,0.74) 80%,rgba(0,0,0,0.84) 100%)',
      title: 'Your Ibadah, all in one place',
      sub: "Qur'an, Duas & Dhikr, Asma ul Husna, Zakaat calculator and more" },
  ];

  componentWillUnmount() { this.clearTimers(); }

  clearTimers() {
    clearTimeout(this._smsTimer);
    clearInterval(this._tick);
  }

  /* ── intro stage ── */
  setSlide = (i) => this.setState({ slide: i });

  nextOrStart = () => {
    if (this.state.slide < this.slideData.length - 1) {
      this.setState(s => ({ slide: s.slide + 1 }));
    } else {
      this.enterLogin();
    }
  };

  skip = () => this.enterLogin();

  enterLogin = () => this.setState({ stage: 'phone', stepDir: 'fwd' });

  /* ── login stage (phone → otp) ── */
  startOtpTimers = () => {
    this.clearTimers();
    this._smsTimer = setTimeout(() => this.setState({ smsVisible: true }), 1600);
    this._tick = setInterval(() => {
      this.setState(s => (s.stage === 'otp' && s.resendIn > 0 && !s.success ? { resendIn: s.resendIn - 1 } : {}));
    }, 1000);
  };

  goBack = () => {
    if (this.state.stage === 'otp') { this.editPhone(); return; }
    this.clearTimers();
    this.setState({ stage: 'intro', slide: this.slideData.length - 1, stepDir: 'back' });
  };

  editPhone = () => {
    this.clearTimers();
    this.setState({ stage: 'phone', stepDir: 'back', otp: '', otpError: false, verifying: false, smsVisible: false, resendIn: 30 });
  };

  onContinue = () => {
    if (this.state.phone.length !== 10) { this.setState({ phoneError: true }); return; }
    this.setState({ stage: 'otp', stepDir: 'fwd', otp: '', otpError: false, resendIn: 30, smsVisible: false });
    this.startOtpTimers();
  };

  verify = () => {
    const s = this.state;
    if (s.verifying || s.success || s.otp.length !== 6) return;
    const ok = s.otp === this.CODE;
    this.setState({ verifying: true, otpError: false });
    setTimeout(() => {
      if (ok) {
        this.setState({ verifying: false, success: true });
        setTimeout(() => { window.location.href = '../Home Screen.dc.html'; }, 900);
      } else {
        this.setState({ verifying: false, otpError: true, smsVisible: true });
        setTimeout(() => this.setState(st => (st.otpError ? { otpError: false, otp: '' } : {})), 1200);
      }
    }, 800);
  };

  pressKey = (d) => () => {
    const s = this.state;
    if (s.stage === 'phone') {
      if (s.phone.length >= 10) return;
      this.setState({ phone: s.phone + d, phoneError: false });
      return;
    }
    if (s.verifying || s.success) return;
    const base = s.otpError ? '' : s.otp;
    if (base.length >= 6) return;
    const next = base + d;
    this.setState({ otp: next, otpError: false });
    if (next.length === 6) setTimeout(() => this.verify(), 260);
  };

  pressBackspace = () => {
    const s = this.state;
    if (s.stage === 'phone') {
      this.setState({ phone: s.phone.slice(0, -1), phoneError: false });
      return;
    }
    if (s.verifying || s.success) return;
    if (s.otpError) { this.setState({ otpError: false, otp: '' }); return; }
    this.setState({ otp: s.otp.slice(0, -1) });
  };

  pressKeyFromComponent = (key) => {
    if (key === 'backspace') {
      this.pressBackspace();
    } else {
      this.pressKey(key)();
    }
  };

  autofillFromSms = () => {
    const s = this.state;
    if (s.verifying || s.success) return;
    this.setState({ smsVisible: false, otpError: false, otp: '' });
    this.CODE.split('').forEach((_, i) => {
      setTimeout(() => this.setState({ otp: this.CODE.slice(0, i + 1) }), 120 * (i + 1));
    });
    setTimeout(() => this.verify(), 120 * 7 + 60);
  };

  resend = () => {
    if (this.state.resendIn > 0) return;
    this.setState({ resendIn: 30, otp: '', otpError: false, smsVisible: false });
    clearTimeout(this._smsTimer);
    this._smsTimer = setTimeout(() => this.setState({ smsVisible: true }), 1400);
  };

  restart = () => {
    this.clearTimers();
    this.setState({
      stage: 'intro', slide: 0, stepDir: 'back',
      phone: '', phoneError: false, otp: '', otpError: false,
      verifying: false, success: false, resendIn: 30, smsVisible: false,
    });
  };

  fmt(p) { return p.length <= 5 ? p : p.slice(0, 5) + ' ' + p.slice(5); }

  renderVals() {
    const s = this.state;
    const isIntro = s.stage === 'intro';
    const isPhone = s.stage === 'phone';
    const isOtp = s.stage === 'otp';
    const cur = s.slide;
    const last = this.slideData.length - 1;
    const full = s.phone.length === 10;

    /* board rings */
    const introActive = isIntro ? cur : -1;
    const phoneActive = isPhone ? (s.phoneError ? 2 : (full ? 1 : 0)) : -1;
    const otpActive = isOtp ? ((s.success || s.verifying) ? 3 : (s.otpError ? 2 : (s.otp.length > 0 ? 1 : 0))) : -1;

    return {
      /* stages */
      isIntroStage: isIntro,
      isLoginStage: !isIntro,
      introActive,
      phoneActive,
      otpActive,
      restart: this.restart,

      /* intro */
      activeSlide: this.slideData[cur],
      activeDotIdx: cur,
      selectDot: this.setSlide,
      ctaLabel: cur === last ? 'Get started!' : 'Next',
      nextOrStart: this.nextOrStart,
      skip: this.skip,
      showSkip: isIntro && cur !== last,

      /* login shared */
      isPhoneStep: isPhone,
      isOtpStep: isOtp,
      stepAnim: s.stepDir === 'back' ? 'step-back' : 'step-fwd',
      goBack: this.goBack,
      pressKeyFromComponent: this.pressKeyFromComponent,

      /* phone step */
      phoneDisplay: this.fmt(s.phone),
      phoneMask: s.phone.length < 10 ? '00000 00000'.slice(this.fmt(s.phone).length) : '',
      phoneCursor: isPhone && !full,
      phoneError: s.phoneError,
      onContinue: this.onContinue,

      /* otp step */
      phoneFmt: this.fmt(s.phone || '8123403269'),
      editPhone: this.editPhone,
      otp: s.otp,
      showOtpError: s.otpError,
      showVerifying: s.verifying,
      showSuccess: s.success,
      resendIn: s.resendIn,
      smsVisible: isOtp && s.smsVisible,
      resend: this.resend,
    };
  }
}
</script>
</body>
</html>
